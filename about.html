<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prapanch Kokkalemada | About</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
    
    <style>
        /* ─── RESET & VARS ──────────────────────────────────────── */
        * , *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0b0d; --fg: #ede9e0; --gold: #c9a84c; 
            --line: rgba(237,233,224,.1); --sans: 'DM Sans', sans-serif;
            --display: 'Bebas Neue', sans-serif;
        }
        
        html, body {
            width: 100%; height: 100%;
            background: var(--bg); color: var(--fg);
            font-family: var(--sans); overflow: hidden; 
            overscroll-behavior: none; cursor: none;
        }

        /* ─── AMBIENT AURA ────────────────────────────────────────── */
        #aura {
            position: fixed; top: 0; left: 0; width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(201,168,76,.08) 0%, transparent 60%);
            border-radius: 50%; pointer-events: none; z-index: 0;
            transform: translate(-50%,-50%); transition: opacity .5s;
            mix-blend-mode: screen; will-change: transform;
        }

        /* ─── MAIN NAV ────────────────────────────────────────────── */
        #mainnav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 9999;
            padding: 1.65rem 3rem; display: flex; justify-content: space-between;
            align-items: center; background: rgba(10,11,13,.88);
            backdrop-filter: blur(20px); border-bottom: 1px solid var(--line);
        }
        .nav-logo { font-family: var(--display); font-size: 1rem; letter-spacing: .1em; color: var(--fg); text-decoration: none; }
        .nav-logo span { color: var(--gold); }
        .nav-links { display: flex; gap: 2.5rem; list-style: none; }
        .nav-links a { font-size: .65rem; letter-spacing: .12em; text-transform: uppercase; color: rgba(237,233,224,.35); text-decoration: none; transition: color .2s; }
        .nav-links a:hover, .nav-links a.act { color: var(--fg); }
        .nav-cta { font-size: .65rem; letter-spacing: .12em; text-transform: uppercase; color: var(--fg); text-decoration: none; border: 1px solid rgba(237,233,224,.2); padding: .5rem 1.2rem; transition: background .3s, color .3s; }
        .nav-cta:hover { background: var(--gold); color: var(--bg); }

        /* ─── INFINITE GRID ARENA ───────────────────────────────── */
        #images { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; overflow: hidden; cursor: grab; z-index: 10; }
        #images:active { cursor: grabbing; }

        /* THE BUBBLE UNIT (Grouped Arena) */
        .item {
            position: absolute; top: 0; left: 0;
            will-change: transform;
            display: flex; /* Side-by-side alignment */
            align-items: center;
            gap: 40px; /* Space between Image and Text */
            padding: 20px;
            pointer-events: auto;
        }

        /* Image Side */
        .tw-card {
            flex-shrink: 0;
            position: relative; 
            border-radius: 1rem; overflow: hidden;
            border: 1px solid rgba(201,168,76,.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 15px rgba(201,168,76,.1);
            transition: all .5s cubic-bezier(.4,0,.2,1);
        }
        .tw-card img { width: 100%; height: auto; display: block; }

        .item:hover .tw-card {
            transform: scale(1.05);
            border: 1px solid rgba(201,168,76,.8);
            box-shadow: 0 30px 60px rgba(0,0,0,0.8), 0 0 30px rgba(201,168,76,0.4);
        }

        /* Text Side */
        .item-meta {
            position: relative;
            width: 280px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* The Tail connecting Image to Year */
        .item-tail {
            position: absolute;
            left: -40px; top: 40px;
            width: 40px; height: 1px;
            background: linear-gradient(to right, rgba(255,255,255,0.8), transparent);
            box-shadow: 0 0 10px rgba(255,255,255,0.4);
        }

        .item-year {
            font-family: var(--display);
            font-size: 5rem; /* Larger anchor */
            line-height: 0.9;
            color: #ffffff;
            text-shadow: 0 0 30px rgba(255,255,255,0.2);
            margin-bottom: 10px;
        }

        .item-desc {
            font-size: 0.85rem;
            color: rgba(237, 233, 224, 0.6);
            line-height: 1.6;
            max-width: 240px;
        }

        /* ─── FOOTER ────────────────────────────────────────────── */
        .site-footer { position: fixed; bottom: 0; left: 0; right: 0; z-index: 9999; display: flex; justify-content: space-between; align-items: center; padding: 1.2rem 3rem; background: rgba(10,11,13,.88); border-top: 1px solid var(--line); backdrop-filter: blur(10px); }
        .ft-logo { font-size: 0.75rem; color: rgba(237,233,224,.3); text-transform: uppercase; }
        .ft-link { font-size: 0.65rem; color: var(--gold); text-decoration: none; margin-left: 2rem; }
    </style>
</head>
<body>

    <div id="aura"></div>

    <nav id="mainnav" role="navigation">
        <a class="nav-logo" href="index.html">PRAPANCH <span>KOKKALEMADA</span></a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html" class="act">About</a></li>
            <li><a href="index.html#section-cases">Work</a></li>
        </ul>
        <a class="nav-cta" href="mailto:your.email@example.com"><span>Let's Connect ↗</span></a>
    </nav>

    <div id="images"></div>

    <footer class="site-footer">
        <div class="ft-logo">PRAPANCH KOKKALEMADA © 2026</div>
        <div>
            <a href="https://linkedin.com/in/yourprofile" class="ft-link">LINKEDIN</a>
            <a href="mailto:your.email@example.com" class="ft-link">E-MAIL</a>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script>
        const gridData = [
            { x: 150, y: 150, w: 320, src: '1.png', year: '2026', desc: 'MBA Candidate at Michigan State University. Global Student Ambassador focusing on Strategic Operations.' },
            { x: 800, y: 400, w: 280, src: '2.png', year: '2025', desc: 'Strategy Associate Intern. Developed data-driven frameworks for market entry and P&L optimization.' },
            { x: 1400, y: 200, w: 350, src: '3.png', year: '2024', desc: 'Systems Engineer. Leading agile transformations and optimizing supply chain bottlenecks.' },
            { x: 300, y: 900, w: 300, src: '4.png', year: '2023', desc: 'Operations Specialist. Implementing automated workflows using Power BI and SQL.' },
            { x: 1000, y: 1100, w: 260, src: '5.png', year: '2022', desc: 'Consulting Projects solving high-impact commercial challenges for tech clients.' },
            { x: 1700, y: 900, w: 320, src: 'GSA.jpg', year: '2021', desc: 'Engineering Lead. Bridging the gap between technical infrastructure and business growth.' },
            { x: 100, y: 1600, w: 340, src: 'MBAA.jpg', year: '2020', desc: 'Foundational Engineering. Core specialization in computer science and systems architecture.' },
            { x: 750, y: 1800, w: 300, src: 'class.jpg', year: '2019', desc: 'Project Management. Mastery of Scrum and Lean methodologies in global environments.' },
            { x: 1500, y: 1700, w: 280, src: 'market.jpeg', year: '2018', desc: 'The Origin. Early career focus on data analytics and process automation.' }
        ];

        const container = document.getElementById('images');
        const aura = document.getElementById('aura');
        let winW = window.innerWidth, winH = window.innerHeight;
        // Arena size increased to handle wider flex units
        let tileSize = { w: 2400, h: 2400 }, items = [];
        let mx = winW/2, my = winH/2, ax = mx, ay = my;

        const scroll = { current: { x: 0, y: 0 }, target: { x: 0, y: 0 }, ease: 0.05 };
        const drag = { isDragging: false, startX: 0, startY: 0, scrollX: 0, scrollY: 0 };

        document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });

        function buildGrid() {
            container.innerHTML = '';
            items = [];
            const repsX = [0, tileSize.w], repsY = [0, tileSize.h];

            gridData.forEach((d) => {
                const img = new Image();
                img.src = d.src;
                img.onload = () => {
                    const ratio = img.naturalHeight / img.naturalWidth;
                    const calculatedH = d.w * ratio;
                    const totalW = d.w + 320; // protected unit width (image + gap + text)

                    repsX.forEach((offsetX) => {
                        repsY.forEach((offsetY) => {
                            const el = document.createElement('div');
                            el.className = 'item';
                            // The unit width is now the math anchor
                            el.style.width = `${totalW}px`;
                            el.innerHTML = `
                                <div class="tw-card" style="width:${d.w}px"><img src="${d.src}" alt="${d.year}"></div>
                                <div class="item-meta">
                                    <div class="item-tail"></div>
                                    <div class="item-year">${d.year}</div>
                                    <div class="item-desc">${d.desc}</div>
                                </div>
                            `;
                            container.appendChild(el);
                            items.push({ el, x: d.x + offsetX, y: d.y + offsetY, w: totalW, h: calculatedH, extraX: 0, extraY: 0 });
                        });
                    });
                };
            });
        }

        function render() {
            ax += (mx - ax) * 0.04;
            ay += (my - ay) * 0.04;
            aura.style.transform = `translate(calc(${ax}px - 50%), calc(${ay}px - 50%))`;

            scroll.current.x += (scroll.target.x - scroll.current.x) * scroll.ease;
            scroll.current.y += (scroll.target.y - scroll.current.y) * scroll.ease;

            items.forEach(item => {
                let posX = item.x + scroll.current.x + item.extraX;
                let posY = item.y + scroll.current.y + item.extraY;

                // Teleportation wrapping based on the FULL bubble width (item.w)
                if (posX > winW + 400) item.extraX -= tileSize.w;
                if (posX + item.w < -600) item.extraX += tileSize.w;
                if (posY > winH + 400) item.extraY -= tileSize.h;
                if (posY + item.h < -600) item.extraY += tileSize.h;

                item.el.style.transform = `translate3d(${posX}px, ${posY}px, 0)`;
            });

            requestAnimationFrame(render);
        }

        window.addEventListener('wheel', e => { scroll.target.x -= e.deltaX * 0.5; scroll.target.y -= e.deltaY * 0.5; }, { passive: true });
        window.addEventListener('pointerdown', e => { drag.isDragging = true; drag.startX = e.clientX; drag.startY = e.clientY; drag.scrollX = scroll.target.x; drag.scrollY = scroll.target.y; });
        window.addEventListener('pointerup', () => drag.isDragging = false);
        window.addEventListener('pointermove', e => { if (drag.isDragging) { scroll.target.x = drag.scrollX + (e.clientX - drag.startX) * 1.5; scroll.target.y = drag.scrollY + (e.clientY - drag.startY) * 1.5; } });

        buildGrid();
        render();
    </script>
</body>
</html>
