<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=5" />
  <meta name="format-detection" content="telephone=no" />
  <title>About | PK </title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@100..700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --margin: 30rem;
      --gap: 20rem;
      --column: calc((var(--rvw) * 100 - var(--margin) * 2 - var(--gap) * 9) / 10);
    }
    /* Custom styling for the Header text line alone */
.frame .frame-left h1 {
  font-family: 'Bebas Neue', sans-serif; /* Or your preferred font */
  font-size: 24rem; /* Adjusted for your .069vw scale */
  letter-spacing: 0.05em;
  text-transform: uppercase;
  font-weight: 400;
  color: #000; /* Adjust color if needed */
}  
    @media (max-width: 1024px) {
      :root {
        --margin: 15px;
        --gap: 10rem;
        --column: calc((100vw - var(--margin) * 2 - var(--gap) * 5) / 6);
      }
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html {
      background: white;
      color: #000;
      font-size: .0694444444vw;
      overflow: hidden;
    }
    @media (max-width: 1024px) { html { font-size: 1px; } }
    body {
      font-family: 'Roboto Mono', monospace;
      font-size: 12rem;
      font-weight: 400;
      line-height: 1.21;
      margin: 0;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior-y: none;
    }
    a { text-decoration: none; color: inherit; }
    
    .frame {
      width: 100%;
      position: fixed;
      padding: var(--margin);
      top: 0;
      z-index: 9;
      font-size: 12rem;
      text-transform: uppercase;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
    }
    .frame .frame-left { display: flex; align-items: center; gap: 20rem; }
    .frame .frame-left > a, .frame .frame-left h1 a { position: relative; }
    .frame .frame-left > a:after, .frame .frame-left h1 a:after {
      content: "";
      width: 100%;
      height: 1px;
      position: absolute;
      bottom: 0;
      left: 0;
      background: currentColor;
      transform: scaleX(0);
      transform-origin: 0% 50%;
      transition: transform 1s cubic-bezier(.35,.42,0,1);
    }
    .frame .frame-left > a:hover:after, .frame .frame-left h1 a:hover:after {
      transform: scaleX(1);
      transform-origin: 100% 50%;
    }
    .frame h1 { font-size: inherit; font-weight: 400; }
    
    @media (max-width: 1024px) {
      .frame { font-size: 10px; flex-direction: column; }
      .frame .frame-left { width: 100%; flex-wrap: wrap; gap: 5px; justify-content: center; margin-bottom: 5px; }
      .frame .frame-left h1 { width: 100%; order: 9; text-align: center; }
    }

    #hero {
      width: 100%;
      height: 100vh;
      overflow: hidden;
      user-select: none;
      cursor: grab;
    }
    #hero #images {
      width: 100%;
      height: 100%;
      display: inline-block;
      white-space: nowrap;
      position: relative;
    }
    #hero #images .item {
      position: absolute;
      top: 0;
      left: 0;
      will-change: transform;
      white-space: normal;
    }
    #hero #images .item .item-wrapper { will-change: transform; }
    #hero #images .item .item-image { overflow: hidden; }
    #hero #images .item .item-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      will-change: transform;
    }
    #hero #images .item small {
      width: 100%;
      display: block;
      font-size: 8rem;
      line-height: 1.25;
      margin-top: 12rem;
    }
    #hero #images .item small .line-mask,
    #hero #images .item small .line-mask .line {
      transition: transform 2s cubic-bezier(.6,.14,0,1);
    }
    #hero #images .item small:not(.visible) .line-mask { transform: translateY(100%); }
    #hero #images .item small:not(.visible) .line-mask .line { transform: translateY(110%); }
    html.dragging #hero { cursor: grabbing; }
  </style>

        });
        
        this.scroll.last.x = this.scroll.current.x;
        this.scroll.last.y = this.scroll.current.y;
        requestAnimationFrame(this.render);
      }
      
      destroy() {
        window.removeEventListener("resize", this.onResize);
        window.removeEventListener("wheel", this.onWheel);
        window.removeEventListener("mousemove", this.onMouseMove);
        this.$container.removeEventListener("mousedown", this.onMouseDown);
        window.removeEventListener("mouseup", this.onMouseUp);
        this.observer.disconnect();
      }
    }
