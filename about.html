<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prapanch Kokkalemada | About</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
    
    <style>
        /* ─── FOUNDATION ────────────────────────────────────────── */
        * , *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0b0d; --fg: #ede9e0; --gold: #c9a84c; 
            --line: rgba(237,233,224,.1); --sans: 'DM Sans', sans-serif;
            --display: 'Bebas Neue', sans-serif;
        }
        html, body { width: 100%; height: 100%; background: var(--bg); color: var(--fg); font-family: var(--sans); overflow: hidden; overscroll-behavior: none; cursor: none; }

        /* ─── AMBIENT AURA ────────────────────────────────────────── */
        #aura { position: fixed; top: 0; left: 0; width: 800px; height: 800px; background: radial-gradient(circle, rgba(201,168,76,.1) 0%, transparent 70%); border-radius: 50%; pointer-events: none; z-index: 0; transform: translate(-50%,-50%); transition: opacity .5s; mix-blend-mode: screen; will-change: transform; }

        /* ─── MAIN NAV ────────────────────────────────────────────── */
        #mainnav { position: fixed; top: 0; left: 0; right: 0; z-index: 9999; padding: 1.65rem 3rem; display: flex; justify-content: space-between; align-items: center; background: rgba(10,11,13,.88); backdrop-filter: blur(20px); border-bottom: 1px solid var(--line); }
        .nav-logo { font-family: var(--display); font-size: 1rem; letter-spacing: .1em; color: var(--fg); text-decoration: none; }
        .nav-logo span { color: var(--gold); }
        .nav-links { display: flex; gap: 2.5rem; list-style: none; }
        .nav-links a { font-size: .65rem; letter-spacing: .12em; text-transform: uppercase; color: rgba(237,233,224,.35); text-decoration: none; transition: color .2s; }
        .nav-links a:hover, .nav-links a.act { color: var(--fg); }
        .nav-cta { font-size: .65rem; letter-spacing: .12em; text-transform: uppercase; color: var(--fg); text-decoration: none; border: 1px solid rgba(237,233,224,.2); padding: .5rem 1.2rem; transition: background .3s, color .3s; }
        .nav-cta:hover { background: var(--gold); color: var(--bg); }

        /* ─── ARENA (THE 3D UNIVERSE) ───────────────────────────── */
        #viewport { perspective: 1500px; width: 100vw; height: 100vh; overflow: hidden; background: radial-gradient(circle at center, #14161a 0%, #0a0b0d 100%); }
        #images { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform-style: preserve-3d; will-change: transform; }

        /* THE MILESTONE BUBBLE */
        .item { 
            position: absolute; top: 0; left: 0; will-change: transform; 
            display: flex; flex-direction: column; align-items: flex-start;
            pointer-events: auto;
        }
        
        .item-wrapper { transform-style: preserve-3d; display: flex; flex-direction: column; cursor: grab; }
        .item-wrapper:active { cursor: grabbing; }

        .tw-card {
            border-radius: 0.5rem; overflow: hidden;
            border: 1px solid rgba(237,233,224,.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: border-color .6s, box-shadow .6s;
            background: #000;
        }
        .tw-card img { width: 100%; height: auto; display: block; filter: grayscale(100%); transition: filter .8s, transform .8s; }

        .item:hover .tw-card { border-color: var(--gold); box-shadow: 0 0 40px rgba(201,168,76,0.2); }
        .item:hover img { filter: grayscale(0%); transform: scale(1.05); }

        /* Text Components */
        .item-meta { margin-top: 1.2rem; max-width: 300px; }
        .item-year { font-family: var(--display); font-size: 3.5rem; color: #fff; line-height: 1; margin-bottom: 5px; letter-spacing: -0.02em; }
        .item-desc { font-size: 0.75rem; color: rgba(237,233,224,0.4); line-height: 1.6; font-weight: 300; }

        /* MOBILE ADJUSTMENTS */
        @media (max-width: 768px) {
            #mainnav { padding: 1rem 1.5rem; }
            .nav-links { display: none; }
            .item-year { font-size: 2.5rem; }
            .item-desc { max-width: 200px; font-size: 0.7rem; }
            .item-meta { margin-top: 0.8rem; }
        }

        /* ─── FOOTER ────────────────────────────────────────────── */
        .site-footer { position: fixed; bottom: 0; left: 0; right: 0; z-index: 9999; display: flex; justify-content: space-between; align-items: center; padding: 1.2rem 3rem; background: rgba(10,11,13,.88); border-top: 1px solid var(--line); backdrop-filter: blur(10px); }
        .ft-logo { font-size: 0.75rem; color: rgba(237,233,224,.3); text-transform: uppercase; }
        .ft-link { font-size: 0.65rem; color: var(--gold); text-decoration: none; margin-left: 2rem; }
    </style>
</head>
<body>

    <div id="aura"></div>

    <nav id="mainnav">
        <a class="nav-logo" href="index.html">PRAPANCH <span>KOKKALEMADA</span></a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html" class="act">About</a></li>
            <li><a href="index.html#section-cases">Work</a></li>
        </ul>
        <a class="nav-cta" href="mailto:your.email@example.com"><span>Let's Connect ↗</span></a>
    </nav>

    <div id="viewport">
        <div id="images"></div>
    </div>

    <footer class="site-footer">
        <div class="ft-logo">PRAPANCH KOKKALEMADA © 2026</div>
        <div>
            <a href="#" class="ft-link">LINKEDIN</a>
            <a href="#" class="ft-link">E-MAIL</a>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script>
        const gridData = [
            { x: 100, y: 100, w: 320, src: '1.png', year: '2026', desc: 'MBA Candidate at Michigan State University. Global Student Ambassador focusing on Strategic Operations.' },
            { x: 800, y: 600, w: 280, src: '2.png', year: '2025', desc: 'Strategy Associate Intern. Developed data-driven frameworks for market entry and P&L optimization.' },
            { x: 1500, y: 200, w: 380, src: '3.png', year: '2024', desc: 'Systems Engineer. Leading agile transformations and optimizing supply chain bottlenecks.' },
            { x: 400, y: 1200, w: 320, src: '4.png', year: '2023', desc: 'Operations Specialist. Implementing automated workflows using Power BI and SQL.' },
            { x: 1200, y: 1500, w: 280, src: '5.png', year: '2022', desc: 'Consulting Projects solving high-impact commercial challenges for tech clients.' },
            { x: 1900, y: 800, w: 340, src: 'GSA.jpg', year: '2021', desc: 'Engineering Lead. Bridging the gap between technical infrastructure and business growth.' },
            { x: 200, y: 2000, w: 360, src: 'MBAA.jpg', year: '2020', desc: 'Foundational Engineering. Core specialization in computer science and systems architecture.' },
            { x: 1000, y: 2200, w: 320, src: 'class.jpg', year: '2019', desc: 'Project Management. Mastery of Scrum and Lean methodologies in global environments.' },
            { x: 1700, y: 1900, w: 300, src: 'market.jpeg', year: '2018', desc: 'The Origin. Early career focus on data analytics and process automation.' }
        ];

        const container = document.getElementById('images');
        const aura = document.getElementById('aura');
        let winW = window.innerWidth, winH = window.innerHeight;
        let isMobile = winW < 768;

        // Arena Settings
        let tileSize = { w: isMobile ? 1200 : 2800, h: isMobile ? 3000 : 2800 };
        let items = [];
        const mouse = { x: 0.5, y: 0.5, targetX: 0.5, targetY: 0.5 };
        const scroll = { x: 0, y: 0, targetX: 0, targetY: 0, ease: 0.05 };
        const drag = { active: false, sx: 0, sy: 0, scrollX: 0, scrollY: 0 };
        let ax = winW/2, ay = winH/2, mx = ax, my = ay;

        document.addEventListener('mousemove', e => { 
            mx = e.clientX; my = e.clientY; 
            mouse.targetX = e.clientX / winW; mouse.targetY = e.clientY / winH;
        });

        function buildGrid() {
            container.innerHTML = ''; items = [];
            const repsX = [0, tileSize.w], repsY = [0, tileSize.h];
            
            gridData.forEach((d) => {
                const img = new Image(); img.src = d.src;
                img.onload = () => {
                    const ratio = img.naturalHeight / img.naturalWidth;
                    const calculatedH = d.w * ratio;
                    
                    repsX.forEach((ox) => {
                        repsY.forEach((oy) => {
                            const el = document.createElement('div');
                            el.className = 'item';
                            const width = isMobile ? d.w * 0.7 : d.w;
                            el.style.width = `${width}px`;
                            el.innerHTML = `
                                <div class="item-wrapper">
                                    <div class="tw-card"><img src="${d.src}"></div>
                                    <div class="item-meta">
                                        <div class="item-year">${d.year}</div>
                                        <div class="item-desc">${d.desc}</div>
                                    </div>
                                </div>
                            `;
                            container.appendChild(el);
                            items.push({ 
                                el, 
                                x: (isMobile ? winW * 0.15 : d.x) + ox, 
                                y: (isMobile ? (items.length * 450) % tileSize.h : d.y) + oy, 
                                w: width, 
                                h: calculatedH + 120, 
                                ex: 0, ey: 0, 
                                z: Math.random() * 500 - 250 // True depth
                            });
                        });
                    });
                };
            });
        }

        function render() {
            // Aura Movement
            ax += (mx - ax) * 0.04; ay += (my - ay) * 0.04;
            aura.style.transform = `translate(calc(${ax}px - 50%), calc(${ay}px - 50%))`;

            // Perspective Tilt (Moves AGAINST the cursor)
            mouse.x += (mouse.targetX - mouse.x) * 0.05;
            mouse.y += (mouse.targetY - mouse.y) * 0.05;
            const rotY = (mouse.x - 0.5) * -15;
            const rotX = (mouse.y - 0.5) * 15;

            // Scroll Smoothing
            scroll.x += (scroll.targetX - scroll.x) * scroll.ease;
            scroll.y += (scroll.targetY - scroll.y) * scroll.ease;

            items.forEach(item => {
                let px = item.x + scroll.x + item.ex;
                let py = item.y + scroll.y + item.ey;

                // Seamless Loop Math
                if (px > winW + 600) item.ex -= tileSize.w;
                if (px + item.w < -600) item.ex += tileSize.w;
                if (py > winH + 600) item.ey -= tileSize.h;
                if (py + item.h < -600) item.ey += tileSize.h;

                // 3D Transform including Z-depth and rotation tilt
                item.el.style.transform = `translate3d(${px}px, ${py}px, ${item.z}px) rotateY(${rotY}deg) rotateX(${rotX}deg)`;
            });
            requestAnimationFrame(render);
        }

        // INPUT HANDLERS
        window.addEventListener('wheel', e => { scroll.targetX -= e.deltaX; scroll.targetY -= e.deltaY; }, { passive: true });
        window.addEventListener('pointerdown', e => { drag.active = true; drag.sx = e.clientX; drag.sy = e.clientY; drag.scrollX = scroll.targetX; drag.scrollY = scroll.targetY; });
        window.addEventListener('pointerup', () => drag.active = false);
        window.addEventListener('pointermove', e => { if (drag.active) { scroll.targetX = drag.scrollX + (e.clientX - drag.sx) * 1.5; scroll.targetY = drag.scrollY + (e.clientY - drag.sy) * 1.5; } });
        window.addEventListener('resize', () => { winW = window.innerWidth; winH = window.innerHeight; isMobile = winW < 768; buildGrid(); });

        buildGrid();
        render();
    </script>
</body>
</html>
