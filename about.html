<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PRAPANCH KOKKALEMADA | ABOUT | Gallery View</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    /* ─── RESET & FLUID SCALE ─── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg: #0a0b0d; --fg: #ede9e0; --gold: #c9a84c;
      --line: rgba(237,233,224,.1); --sans: 'DM Sans', sans-serif;
      --display: 'Bebas Neue', sans-serif;
    }

    /* Your custom fluid scale: 1rem ≈ 1px on desktop */
    html { font-size: .0694444444vw; scroll-behavior: smooth; }
    body { 
      background: var(--bg); color: var(--fg); font-family: var(--sans); 
      overflow: hidden; overscroll-behavior: none; 
    }

    /* ─── CURSOR ─── */
    #cdot { position: fixed; width: 6rem; height: 6rem; background: #fff; border-radius: 50%; z-index: 100000; pointer-events: none; transform: translate(-50%,-50%); }
    #cring { position: fixed; width: 40rem; height: 40rem; border: 1rem solid rgba(255,255,255,0.3); border-radius: 50%; z-index: 100000; pointer-events: none; transform: translate(-50%,-50%); transition: width 0.3s, height 0.3s, border-color 0.3s; }
    #aura { position: fixed; width: 800rem; height: 800rem; background: radial-gradient(circle, rgba(201,168,76,.12) 0%, transparent 70%); border-radius: 50%; pointer-events: none; z-index: 1; transform: translate(-50%,-50%); mix-blend-mode: screen; }

    /* ─── NAVIGATION (Matches Main Page Ratio) ─── */
    #mainnav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 99999;
      padding: 26rem 48rem; display: flex; justify-content: space-between; align-items: center;
      background: rgba(10, 11, 13, 0.95); backdrop-filter: blur(20px); border-bottom: 1rem solid var(--line);
    }
    .nav-logo { font-family: var(--display); font-size: 16rem; letter-spacing: .1em; color: var(--fg); text-decoration: none; }
    .nav-logo span { color: var(--gold); }
    .nav-links { display: flex; gap: 40rem; list-style: none; }
    .nav-links a { font-size: 10.5rem; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(237,233,224,.35); text-decoration: none; transition: color 0.2s; }
    .nav-links a:hover, .nav-links a.act { color: var(--fg); }
    .nav-cta { font-size: 10.5rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--fg); text-decoration: none; border: 1rem solid rgba(237,233,224,0.2); padding: 8rem 20rem; transition: all 0.3s; }
    .nav-cta:hover { background: var(--gold); color: var(--bg); }

    /* ─── ARENA & TILES ─── */
    #viewport { width: 100vw; height: 100vh; overflow: hidden; position: relative; z-index: 5; background: var(--bg); }
    #images { position: absolute; top: 0; left: 0; width: 100%; height: 100%; will-change: transform; }
    .item { position: absolute; top: 0; left: 0; will-change: transform; pointer-events: auto; }
    
    .item-frame { 
        width: 100%; height: 100%; overflow: hidden; border-radius: 3rem; 
        border: 1rem solid rgba(201,168,76,.18); box-shadow: 0 8rem 32rem rgba(0,0,0,0.6); 
        background: #000; position: relative; 
    }
    .item-frame img { 
        width: 150%; height: 150%; object-fit: cover; position: absolute; 
        top: -25%; left: -25%; will-change: transform; 
        filter: grayscale(60%) brightness(0.8); transition: filter 0.6s; 
    }
    .item:hover .item-frame img { filter: grayscale(0%) brightness(1); }

    .item-overlay { 
        position: absolute; inset: 0; 
        background: linear-gradient(to top, rgba(0,0,0,0.88) 0%, rgba(0,0,0,0.1) 55%, transparent 100%); 
        display: flex; flex-direction: column; justify-content: flex-end; 
        padding: 20rem; pointer-events: none; opacity: 0.9; transition: opacity 0.3s; 
    }
    .item-year { font-family: var(--display); font-size: 45rem; color: var(--gold); line-height: 0.9; margin-bottom: 5rem; }
    .item-desc { font-size: 11rem; color: var(--fg); line-height: 1.4; font-weight: 300; }

    /* ─── FOOTER (Matches Main Page Ratio) ─── */
    .site-footer {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 99999;
      display: flex; justify-content: space-between; align-items: center;
      padding: 24rem 48rem; background: rgba(10, 11, 13, 0.9);
      border-top: 1rem solid var(--line); backdrop-filter: blur(10px);
    }
    .ft-logo { font-size: 14rem; color: rgba(237,233,224,0.4); text-transform: uppercase; }
    .ft-link { font-size: 10rem; color: var(--gold); text-decoration: none; margin-left: 32rem; }

    @media (max-width: 768px) {
        #cdot, #cring, #aura { display: none !important; }
        #mainnav { padding: 15rem 20rem; }
        .nav-links, .nav-cta { display: none; }
    }
  </style>
</head>
<body>

  <div id="cdot"></div>
  <div id="cring"></div>
  <div id="aura"></div>

  <nav id="mainnav">
      <a class="nav-logo" href="index.html">PRAPANCH <span>KOKKALEMADA</span></a>
      <ul class="nav-links">
          <li><a href="index.html">HOME</a></li>
          <li><a href="about.html" class="act">ABOUT</a></li>
          <li><a href="index.html#section-cases">WORK</a></li>
      </ul>
      <a class="nav-cta" href="mailto:prapanch@example.com">LET'S CONNECT &#8599;</a>
  </nav>

  <div id="viewport">
      <div id="images"></div>
  </div>

  <footer class="site-footer">
      <div class="ft-logo">PRAPANCH KOKKALEMADA &copy; 2026</div>
      <div>
          <a href="https://linkedin.com/in/prapanch" class="ft-link" target="_blank">LINKEDIN</a>
          <a href="mailto:prapanch@example.com" class="ft-link">E-MAIL</a>
      </div>
  </footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script>
    const gridData = [
        { x: 100, y: 100, w: 320, h: 480, src: '1.png', year: '2026', desc: 'MBA Candidate at MSU.' },
        { x: 600, y: 400, w: 550, h: 320, src: '2.png', year: '2025', desc: 'Strategy Associate.' },
        { x: 1100, y: 150, w: 300, h: 450, src: '3.png', year: '2024', desc: 'Systems Engineer.' },
        { x: 300, y: 800, w: 400, h: 250, src: '4.png', year: '2023', desc: 'Operations Specialist.' },
        { x: 900, y: 1000, w: 280, h: 420, src: '5.png', year: '2022', desc: 'Consulting Projects.' },
        { x: 1400, y: 650, w: 450, h: 320, src: 'GSA.jpg', year: '2021', desc: 'Engineering Lead.' },
        { x: 150, y: 1400, w: 380, h: 380, src: 'MBAA.jpg', year: '2020', desc: 'Foundational Engineering.' },
        { x: 700, y: 1600, w: 420, h: 280, src: 'class.jpg', year: '2019', desc: 'Project Management.' },
        { x: 1250, y: 1400, w: 320, h: 450, src: 'market.jpeg', year: '2018', desc: 'The Origin.' }
    ];

    const container = document.getElementById('images');
    const aura = document.getElementById('aura'), cdot = document.getElementById('cdot'), cring = document.getElementById('cring');
    let winW = window.innerWidth, winH = window.innerHeight;
    let items = [], TILE_W = 1600, TILE_H = 1400;
    let mx = winW/2, my = winH/2, ax = mx, ay = my;
    const mouse = { x: 0.5, y: 0.5, tX: 0.5, tY: 0.5 };
    const scroll = { x: 0, y: 0, tX: 0, tY: 0, ease: 0.025 };
    const pan = { x: 0, y: 0, tX: 0, tY: 0 };

    function buildGrid() {
        container.innerHTML = ''; items = [];
        const repsX = [-TILE_W, 0, TILE_W], repsY = [-TILE_H, 0, TILE_H];
        gridData.forEach((d) => {
            repsX.forEach((ox) => {
                repsY.forEach((oy) => {
                    const el = document.createElement('div');
                    el.className = 'item';
                    el.style.width = `${d.w}px`; el.style.height = `${d.h}px`;
                    el.innerHTML = `
                        <div class="item-wrapper" style="height:100%">
                            <div class="item-frame">
                                <img src="${d.src}" loading="eager" decoding="async">
                                <div class="item-overlay">
                                    <div class="item-year">${d.year}</div>
                                    <div class="item-desc">${d.desc}</div>
                                </div>
                            </div>
                        </div>`;
                    container.appendChild(el);
                    items.push({ el, img: el.querySelector('img'), x: d.x + ox, y: d.y + oy, w: d.w, h: d.h, ex: 0, ey: 0 });
                });
            });
        });
    }

    function render() {
        ax += (mx - ax) * 0.1; ay += (my - ay) * 0.1;
        cdot.style.left = `${mx}px`; cdot.style.top = `${my}px`;
        cring.style.left = `${ax}px`; cring.style.top = `${ay}px`;
        aura.style.transform = `translate(calc(${ax}px - 50%), calc(${ay}px - 50%))`;

        pan.x += (pan.tX - pan.x) * 0.02; pan.y += (pan.tY - pan.y) * 0.02;
        mouse.x += (mouse.tX - mouse.x) * 0.05; mouse.y += (mouse.tY - mouse.y) * 0.05;
        scroll.x += (scroll.tX - scroll.x) * scroll.ease; scroll.y += (scroll.tY - scroll.y) * scroll.ease;

        const rotY = (mouse.x - 0.5) * -25, rotX = (mouse.y - 0.5) * 25;

        items.forEach(item => {
            let px = item.x + scroll.x + item.ex + pan.x, py = item.y + scroll.y + item.ey + pan.y;
            if (px > winW + item.w) item.ex -= TILE_W * 1.5;
            if (px + item.w < -item.w) item.ex += TILE_W * 1.5;
            if (py > winH + item.h) item.ey -= TILE_H * 1.5;
            if (py + item.h < -item.h) item.ey += TILE_H * 1.5;

            item.el.style.transform = `translate3d(${px}px, ${py}px, 0) rotateY(${rotY}deg) rotateX(${rotX}deg)`;
            if (item.img) item.img.style.transform = `translate3d(${px * -0.15}px, ${py * -0.15}px, 0) scale(1.3)`;
        });
        requestAnimationFrame(render);
    }

    document.addEventListener('mousemove', e => { 
        mx = e.clientX; my = e.clientY; 
        mouse.tX = e.clientX / winW; mouse.tY = e.clientY / winH;
        pan.tX = (e.clientX - winW / 2); pan.tY = (e.clientY - winH / 2);
    });
    window.addEventListener('wheel', e => { scroll.tX -= e.deltaX; scroll.tY -= e.deltaY; }, { passive: true });
    window.addEventListener('resize', () => { winW = window.innerWidth; winH = window.innerHeight; buildGrid(); });

    buildGrid();
    render();
  </script>
</body>
</html>
