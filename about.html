<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prapanch Kokkalemada | About</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
    
    <style>
        /* ─── RESET & VARS ──────────────────────────────────────── */
        * , *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0b0d; 
            --fg: #ede9e0; 
            --gold: #c9a84c; 
            --line: rgba(237,233,224,.1);
            --sans: 'DM Sans', sans-serif;
            --display: 'Bebas Neue', sans-serif;
            --serif: 'DM Serif Display', Georgia, serif;
        }
        
        html, body {
            width: 100%; height: 100%;
            background: var(--bg); color: var(--fg);
            font-family: var(--sans);
            overflow: hidden; /* Infinite grid handles the "scroll" */
            overscroll-behavior: none;
        }

        /* ─── MAIN NAV ────────────────────────────────────────────── */
        #mainnav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 9999;
            padding: 1.65rem 3rem; display: flex; justify-content: space-between;
            align-items: center; background: rgba(10,11,13,.88);
            backdrop-filter: blur(20px); border-bottom: 1px solid var(--line);
        }
        .nav-logo {
            font-family: var(--display); font-size: 1rem; letter-spacing: .1em;
            color: var(--fg); text-decoration: none;
        }
        .nav-logo span { color: var(--gold); }
        .nav-links { display: flex; gap: 2.5rem; list-style: none; }
        .nav-links a {
            font-size: .65rem; letter-spacing: .12em; text-transform: uppercase;
            color: rgba(237,233,224,.35); text-decoration: none; transition: color .2s;
        }
        .nav-links a:hover, .nav-links a.act { color: var(--fg); }
        .nav-cta {
            font-size: .65rem; letter-spacing: .12em; text-transform: uppercase;
            color: var(--fg); text-decoration: none; border: 1px solid rgba(237,233,224,.2);
            padding: .5rem 1.2rem; transition: background .3s, color .3s;
        }
        .nav-cta:hover { background: var(--gold); color: var(--bg); }

        /* ─── INFINITE GRID ─────────────────────────────────────── */
        #images {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            overflow: hidden; cursor: grab; z-index: 10;
        }
        #images:active { cursor: grabbing; }
        
        .item {
            position: absolute; top: 0; left: 0;
            will-change: transform;
        }

        /* REUSING THE CASE STUDY CARD STYLE */
        .tw-card {
            position: relative;
            width: 100%; height: 100%;
            border-radius: 1rem;
            overflow: hidden;
            border: 1px solid rgba(201,168,76,.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 15px rgba(201,168,76,.1);
            transition: all .5s cubic-bezier(.4,0,.2,1);
        }
        .tw-card img { width: 100%; height: 100%; object-fit: cover; }

        /* Hover Glow Effect */
        .item:hover .tw-card {
            transform: scale(1.05);
            border: 1px solid rgba(201,168,76,.8);
            box-shadow: 0 30px 60px rgba(0,0,0,0.8), 0 0 30px rgba(201,168,76,0.4);
        }

        /* TIMELINE TAILS & LABELS */
        .item-meta {
            position: absolute;
            top: 20px;
            left: calc(100% + 40px); /* Position description outside the image */
            width: 280px;
            pointer-events: none;
        }

        /* The Tail (The Connecting Line) */
        .item-tail {
            position: absolute;
            top: 50px;
            left: -40px;
            width: 40px;
            height: 1px;
            background: #ffffff;
            box-shadow: 0 0 10px rgba(255,255,255,0.8);
        }

        .item-year {
            font-family: var(--display);
            font-size: 3.5rem;
            line-height: 1;
            color: #ffffff;
            text-shadow: 0 0 20px rgba(255,255,255,0.4);
            margin-bottom: 0.5rem;
        }

        .item-desc {
            font-size: 0.85rem;
            color: rgba(237, 233, 224, 0.6);
            line-height: 1.6;
            max-width: 240px;
        }

        /* ─── FOOTER ────────────────────────────────────────────── */
        .site-footer {
            position: fixed; bottom: 0; left: 0; right: 0; z-index: 9999;
            display: flex; justify-content: space-between; align-items: center;
            padding: 1.2rem 3rem; background: rgba(10,11,13,.88);
            border-top: 1px solid var(--line); backdrop-filter: blur(10px);
        }
        .ft-logo { font-size: 0.75rem; color: rgba(237,233,224,.3); text-transform: uppercase; }
        .ft-link { font-size: 0.65rem; color: var(--gold); text-decoration: none; margin-left: 2rem; }

    </style>
</head>
<body>

    <nav id="mainnav" role="navigation">
        <a class="nav-logo" href="index.html">PRAPANCH <span>KOKKALEMADA</span></a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html" class="act">About</a></li>
            <li><a href="index.html#section-cases">Work</a></li>
        </ul>
        <a class="nav-cta" href="mailto:your.email@example.com"><span>Let's Connect ↗</span></a>
    </nav>

    <div id="images"></div>

    <footer class="site-footer">
        <div class="ft-logo">PRAPANCH KOKKALEMADA © 2026</div>
        <div>
            <a href="#" class="ft-link">LINKEDIN</a>
            <a href="#" class="ft-link">E-MAIL</a>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script>
        // 1. DATA (9 Nodes for a "larger" file experience)
        const gridData = [
            { x: 100, y: 100, w: 320, h: 420, src: '1.png', year: '2026', desc: 'MBA Candidate at Michigan State University. Global Student Ambassador focusing on Strategic Operations.' },
            { x: 600, y: 350, w: 280, h: 380, src: '2.png', year: '2025', desc: 'Strategy Associate Intern. Developed data-driven frameworks for market entry and P&L optimization.' },
            { x: 1100, y: 150, w: 350, h: 480, src: '3.png', year: '2024', desc: 'Systems Engineer. Leading agile transformations and optimizing supply chain bottlenecks.' },
            { x: 200, y: 700, w: 300, h: 400, src: '4.png', year: '2023', desc: 'Operations Specialist. Implementing automated workflows using Power BI and SQL.' },
            { x: 750, y: 850, w: 260, h: 360, src: '5.png', year: '2022', desc: 'Consulting Projects. solving high-impact commercial challenges for tech clients.' },
            { x: 1300, y: 750, w: 320, h: 420, src: 'GSA.jpg', year: '2021', desc: 'Engineering Lead. Bridging the gap between technical infrastructure and business growth.' },
            { x: 50, y: 1300, w: 340, h: 450, src: 'MBAA.jpg', year: '2020', desc: 'Foundational Engineering. Core specialization in computer science and systems architecture.' },
            { x: 550, y: 1450, w: 300, h: 400, src: 'class.jpg', year: '2019', desc: 'Project Management. Mastery of Scrum and Lean methodologies in global environments.' },
            { x: 1050, y: 1350, w: 280, h: 380, src: 'market.jpeg', year: '2018', desc: 'The Origin. Early career focus on data analytics and process automation.' }
        ];

        const originalSize = { w: 2000, h: 2000 };
        const container = document.getElementById('images');
        
        let winW = window.innerWidth;
        let winH = window.innerHeight;
        let tileSize = { w: 0, h: 0 };
        let items = [];

        const scroll = { current: { x: 0, y: 0 }, target: { x: 0, y: 0 }, last: { x: 0, y: 0 }, ease: 0.05 };
        const drag = { isDragging: false, startX: 0, startY: 0, scrollX: 0, scrollY: 0 };

        // 2. BUILD THE GRID
        function buildGrid() {
            container.innerHTML = '';
            items = [];
            
            // Adjust bounds based on content spread
            tileSize.w = 1800; 
            tileSize.h = 1800;
            
            const repsX = [0, tileSize.w];
            const repsY = [0, tileSize.h];

            gridData.forEach((d) => {
                repsX.forEach((offsetX) => {
                    repsY.forEach((offsetY) => {
                        const el = document.createElement('div');
                        el.className = 'item';
                        el.style.width = `${d.w}px`;
                        el.style.height = `${d.h}px`;

                        el.innerHTML = `
                            <div class="tw-card">
                                <img src="${d.src}" alt="${d.year}">
                            </div>
                            <div class="item-meta">
                                <div class="item-tail"></div>
                                <div class="item-year">${d.year}</div>
                                <div class="item-desc">${d.desc}</div>
                            </div>
                        `;

                        container.appendChild(el);

                        items.push({
                            el: el,
                            x: d.x + offsetX,
                            y: d.y + offsetY,
                            w: d.w,
                            h: d.h,
                            extraX: 0,
                            extraY: 0,
                            ease: Math.random() * 0.3 + 0.7
                        });
                    });
                });
            });

            tileSize.w *= 2;
            tileSize.h *= 2;
        }

        // 3. RENDER LOOP
        function render() {
            scroll.current.x += (scroll.target.x - scroll.current.x) * scroll.ease;
            scroll.current.y += (scroll.target.y - scroll.current.y) * scroll.ease;

            items.forEach(item => {
                let posX = item.x + scroll.current.x + item.extraX;
                let posY = item.y + scroll.current.y + item.extraY;

                // Seamless Teleportation Math
                if (posX > winW + 200) item.extraX -= tileSize.w;
                if (posX + item.w < -600) item.extraX += tileSize.w;
                if (posY > winH + 200) item.extraY -= tileSize.h;
                if (posY + item.h < -600) item.extraY += tileSize.h;

                item.el.style.transform = `translate3d(${posX}px, ${posY}px, 0)`;
            });

            requestAnimationFrame(render);
        }

        // 4. INTERACTION LISTENERS
        window.addEventListener('wheel', (e) => {
            scroll.target.x -= e.deltaX * 0.5;
            scroll.target.y -= e.deltaY * 0.5;
        }, { passive: true });

        window.addEventListener('pointerdown', (e) => {
            drag.isDragging = true;
            drag.startX = e.clientX; drag.startY = e.clientY;
            drag.scrollX = scroll.target.x; drag.scrollY = scroll.target.y;
        });
        window.addEventListener('pointerup', () => drag.isDragging = false);
        window.addEventListener('pointermove', (e) => {
            if (drag.isDragging) {
                scroll.target.x = drag.scrollX + (e.clientX - drag.startX) * 1.5;
                scroll.target.y = drag.scrollY + (e.clientY - drag.startY) * 1.5;
            }
        });

        // Initialize
        buildGrid();
        render();

    </script>
</body>
</html>
