<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prapanch Kokkalemada | About</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
    
    <style>
        /* ─── FOUNDATION ────────────────────────────────────────── */
        * , *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0b0d; --fg: #ede9e0; --gold: #c9a84c; 
            --line: rgba(237,233,224,.1); --sans: 'DM Sans', sans-serif;
            --display: 'Bebas Neue', sans-serif;
        }
        html, body { 
            width: 100%; height: 100%; 
            background: var(--bg); color: var(--fg); 
            font-family: var(--sans); overflow: hidden; 
            overscroll-behavior: none; cursor: none; 
        }

        /* ─── AMBIENT AURA ────────────────────────────────────────── */
        #aura { position: fixed; top: 0; left: 0; width: 800px; height: 800px; background: radial-gradient(circle, rgba(201,168,76,.1) 0%, transparent 70%); border-radius: 50%; pointer-events: none; z-index: 0; transform: translate(-50%,-50%); transition: opacity .5s; mix-blend-mode: screen; will-change: transform; }

        /* ─── MAIN NAV (Matches Index) ────────────────────────────── */
        #mainnav { position: fixed; top: 0; left: 0; right: 0; z-index: 9999; padding: 1.65rem 3rem; display: flex; justify-content: space-between; align-items: center; background: rgba(10,11,13,.88); backdrop-filter: blur(20px); border-bottom: 1px solid var(--line); }
        .nav-logo { font-family: var(--display); font-size: 1.1rem; letter-spacing: .1em; color: var(--fg); text-decoration: none; }
        .nav-logo span { color: var(--gold); }
        .nav-links { display: flex; gap: 2.5rem; list-style: none; }
        .nav-links a { font-size: .65rem; letter-spacing: .12em; text-transform: uppercase; color: rgba(237,233,224,.35); text-decoration: none; transition: color .2s; }
        .nav-links a:hover, .nav-links a.act { color: var(--fg); }
        .nav-cta { font-size: .65rem; letter-spacing: .12em; text-transform: uppercase; color: var(--fg); text-decoration: none; border: 1px solid rgba(237,233,224,.2); padding: .5rem 1.2rem; transition: background .3s, color .3s; }
        .nav-cta:hover { background: var(--gold); color: var(--bg); }

        /* ─── INFINITE ARENA ────────────────────────────────────── */
        #viewport { perspective: 1800px; width: 100vw; height: 100vh; overflow: hidden; background: radial-gradient(circle at center, #14161a 0%, #0a0b0d 100%); }
        #images { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform-style: preserve-3d; will-change: transform; }

        .item { position: absolute; top: 0; left: 0; will-change: transform; pointer-events: auto; }
        .item-wrapper { transform-style: preserve-3d; transition: transform 0.1s ease-out; cursor: grab; }
        .item-wrapper:active { cursor: grabbing; }

        /* IMAGE OVERLAY CARDS */
        .tw-card {
            position: relative;
            border-radius: 0.75rem; overflow: hidden;
            border: 1px solid rgba(201,168,76,.15);
            box-shadow: 0 15px 45px rgba(0,0,0,0.6);
            transition: border-color .6s, box-shadow .6s;
            background: #000;
        }
        .tw-card img { width: 100%; height: auto; display: block; filter: grayscale(100%) contrast(1.1); transition: filter .8s, transform .8s; }

        /* The Text Overlay - Positioned inside the card */
        .item-overlay {
            position: absolute; inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.3) 50%, transparent 100%);
            display: flex; flex-direction: column; justify-content: flex-end;
            padding: 2rem 1.5rem;
            opacity: 0.85; transition: opacity .4s;
        }

        .item-year { font-family: var(--display); font-size: 4rem; color: var(--gold); line-height: 0.85; margin-bottom: 8px; text-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .item-desc { font-size: 0.8rem; color: var(--fg); line-height: 1.5; font-weight: 300; max-width: 95%; }

        /* Hover States */
        .item:hover .tw-card { border-color: var(--gold); box-shadow: 0 0 50px rgba(201,168,76,0.25); }
        .item:hover .tw-card img { filter: grayscale(0%); transform: scale(1.03); }
        .item:hover .item-overlay { opacity: 1; }

        /* MOBILE OPTIMIZATION */
        @media (max-width: 768px) {
            #mainnav { padding: 1rem 1.5rem; }
            .nav-links, .nav-cta { display: none; }
            .item-year { font-size: 2.8rem; }
            .item-desc { font-size: 0.7rem; line-height: 1.4; }
        }

        /* ─── FOOTER ────────────────────────────────────────────── */
        .site-footer { position: fixed; bottom: 0; left: 0; right: 0; z-index: 9999; display: flex; justify-content: space-between; align-items: center; padding: 1.2rem 3rem; background: rgba(10,11,13,.88); border-top: 1px solid var(--line); backdrop-filter: blur(10px); }
        .ft-logo { font-size: 0.75rem; color: rgba(237,233,224,.3); text-transform: uppercase; }
        .ft-link { font-size: 0.65rem; color: var(--gold); text-decoration: none; margin-left: 2rem; transition: opacity 0.3s; }
        .ft-link:hover { opacity: 0.6; }
    </style>
</head>
<body>

    <div id="aura"></div>

    <nav id="mainnav">
        <a class="nav-logo" href="index.html">PRAPANCH <span>KOKKALEMADA</span></a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html" class="act">About</a></li>
            <li><a href="index.html#section-cases">Work</a></li>
        </ul>
        <a class="nav-cta" href="mailto:prapanch@example.com"><span>Let's Connect ↗</span></a>
    </nav>

    <div id="viewport">
        <div id="images"></div>
    </div>

    <footer class="site-footer">
        <div class="ft-logo">PRAPANCH KOKKALEMADA © 2026</div>
        <div>
            <a href="https://linkedin.com/in/prapanch" class="ft-link" target="_blank">LINKEDIN</a>
            <a href="mailto:prapanch@example.com" class="ft-link">E-MAIL</a>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script>
        // Use your actual filenames from the repo
        const gridData = [
            { x: 150, y: 150, w: 400, src: '1.png', year: '2026', desc: 'MBA Candidate at MSU. Global Student Ambassador focusing on Strategic Operations.' },
            { x: 850, y: 550, w: 380, src: '2.png', year: '2025', desc: 'Strategy Associate. Developed frameworks for market entry and P&L optimization.' },
            { x: 1550, y: 250, w: 420, src: '3.png', year: '2024', desc: 'Systems Engineer. Leading agile transformations and manufacturing bottlenecks.' },
            { x: 450, y: 1100, w: 380, src: '4.png', year: '2023', desc: 'Operations Specialist. Automated workflows using Power BI, SQL, and Lean.' },
            { x: 1250, y: 1400, w: 350, src: '5.png', year: '2022', desc: 'Consulting Projects. Solving commercial challenges for global infrastructure clients.' },
            { x: 1950, y: 850, w: 390, src: 'GSA.jpg', year: '2021', desc: 'Engineering Lead. Bridging the gap between technical system and business growth.' },
            { x: 250, y: 1950, w: 410, src: 'MBAA.jpg', year: '2020', desc: 'Foundational Engineering. Core specialization in systems architecture.' },
            { x: 1050, y: 2150, w: 380, src: 'class.jpg', year: '2019', desc: 'Project Management. Mastery of Scrum delivery in global environments.' },
            { x: 1750, y: 1850, w: 360, src: 'market.jpeg', year: '2018', desc: 'The Origin. Focus on large-scale data modeling and process automation.' }
        ];

        const container = document.getElementById('images');
        const aura = document.getElementById('aura');
        let winW = window.innerWidth, winH = window.innerHeight;
        let isMobile = winW < 768;

        // Density Control: Adjust arena size based on screen to prevent too much empty space
        let tileSize = { 
            w: isMobile ? winW * 2.5 : 2800, 
            h: isMobile ? winH * 4 : 2800 
        };
        
        let items = [];
        const mouse = { x: 0.5, y: 0.5, tX: 0.5, tY: 0.5 };
        const scroll = { x: 0, y: 0, tX: 0, tY: 0, lastX: 0, lastY: 0, ease: 0.05 };
        const drag = { active: false, sx: 0, sy: 0, scrollX: 0, scrollY: 0 };
        let ax = winW/2, ay = winH/2, mx = ax, my = ay;

        document.addEventListener('mousemove', e => { 
            mx = e.clientX; my = e.clientY; 
            mouse.tX = e.clientX / winW; mouse.tY = e.clientY / winH;
        });

        function buildGrid() {
            container.innerHTML = ''; items = [];
            const repsX = [0, tileSize.w], repsY = [0, tileSize.h];
            
            gridData.forEach((d) => {
                const img = new Image(); img.src = d.src;
                img.onload = () => {
                    const ratio = img.naturalHeight / img.naturalWidth;
                    const calculatedH = d.w * ratio;
                    
                    repsX.forEach((ox) => {
                        repsY.forEach((oy) => {
                            const el = document.createElement('div');
                            el.className = 'item';
                            const width = isMobile ? d.w * 0.75 : d.w;
                            el.style.width = `${width}px`;
                            el.innerHTML = `
                                <div class="item-wrapper">
                                    <div class="tw-card">
                                        <img src="${d.src}">
                                        <div class="item-overlay">
                                            <div class="item-year">${d.year}</div>
                                            <div class="item-desc">${d.desc}</div>
                                        </div>
                                    </div>
                                </div>
                            `;
                            container.appendChild(el);
                            items.push({ 
                                el, wrapper: el.querySelector('.item-wrapper'),
                                x: (isMobile ? Math.random() * (winW * 0.8) : d.x) + ox, 
                                y: (isMobile ? (items.length * 400) % tileSize.h : d.y) + oy, 
                                w: width, h: calculatedH, ex: 0, ey: 0, 
                                depth: Math.random() * 0.6 + 0.4
                            });
                        });
                    });
                };
            });
            setTimeout(introAnimation, 600);
        }

        function introAnimation() {
            const wrappers = items.map(i => i.wrapper);
            gsap.fromTo(wrappers, { 
                x: (i) => -items[i].x + winW/2 - items[i].w/2, 
                y: (i) => -items[i].y + winH/2 - items[i].h/2, 
                scale: 0, opacity: 0 
            }, { 
                duration: 2, ease: 'expo.inOut', x: 0, y: 0, scale: 1, opacity: 1, stagger: 0.01 
            });
        }

        function render() {
            // Aura follow
            ax += (mx - ax) * 0.04; ay += (my - ay) * 0.04;
            aura.style.transform = `translate(calc(${ax}px - 50%), calc(${ay}px - 50%))`;

            // Arena movement (Tilt AWAY from cursor)
            mouse.x += (mouse.tX - mouse.x) * 0.06;
            mouse.y += (mouse.tY - mouse.y) * 0.06;
            const rotY = (mouse.x - 0.5) * -10;
            const rotX = (mouse.y - 0.5) * 10;

            scroll.x += (scroll.tX - scroll.x) * scroll.ease;
            scroll.y += (scroll.tY - scroll.y) * scroll.ease;

            items.forEach(item => {
                let px = item.x + scroll.x + item.ex;
                let py = item.y + scroll.y + item.ey;

                // Wrapping logic
                if (px > winW + 600) item.ex -= tileSize.w;
                if (px + item.w < -600) item.ex += tileSize.w;
                if (py > winH + 600) item.ey -= tileSize.h;
                if (py + item.h < -600) item.ey += tileSize.h;

                // 3D Transform
                item.el.style.transform = `translate3d(${px}px, ${py}px, 0) rotateY(${rotY}deg) rotateX(${rotX}deg)`;
            });
            
            scroll.lastX = scroll.x; scroll.lastY = scroll.y;
            requestAnimationFrame(render);
        }

        // Input Logic
        window.addEventListener('wheel', e => { scroll.tX -= e.deltaX; scroll.tY -= e.deltaY; }, { passive: true });
        window.addEventListener('pointerdown', e => { drag.active = true; drag.sx = e.clientX; drag.sy = e.clientY; drag.scrollX = scroll.tX; drag.scrollY = scroll.tY; });
        window.addEventListener('pointerup', () => drag.active = false);
        window.addEventListener('pointermove', e => { if (drag.active) { scroll.tX = drag.scrollX + (e.clientX - drag.sx) * 1.5; scroll.tY = drag.scrollY + (e.clientY - drag.sy) * 1.5; } });
        window.addEventListener('resize', () => { winW = window.innerWidth; winH = window.innerHeight; isMobile = winW < 768; buildGrid(); });

        buildGrid();
        render();
    </script>
</body>
</html>
