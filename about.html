<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prapanch Kokkalemada | About</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
    
    <style>
        /* ─── FOUNDATION ────────────────────────────────────────── */
        * , *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0b0d; --fg: #ede9e0; --gold: #c9a84c; 
            --line: rgba(237,233,224,.1); --sans: 'DM Sans', sans-serif;
            --display: 'Bebas Neue', sans-serif;
        }
        html, body { 
            width: 100%; height: 100%; background: var(--bg); color: var(--fg); 
            font-family: var(--sans); overflow: hidden; overscroll-behavior: none; 
            cursor: none; 
        }

        /* ─── CUSTOM CURSOR ──────────────────────────────────────── */
        #cdot { position: fixed; top: 0; left: 0; width: 6px; height: 6px; background: #fff; border-radius: 50%; z-index: 100000; pointer-events: none; transform: translate(-50%,-50%); }
        #cring { 
            position: fixed; top: 0; left: 0; width: 40px; height: 40px; 
            border: 1px solid rgba(255,255,255,0.3); border-radius: 50%; 
            z-index: 100000; pointer-events: none; transform: translate(-50%,-50%); 
            transition: width 0.3s, height 0.3s, border-color 0.3s, border-width 0.3s;
        }
        #aura { position: fixed; top: 0; left: 0; width: 800px; height: 800px; background: radial-gradient(circle, rgba(201,168,76,.12) 0%, transparent 70%); border-radius: 50%; pointer-events: none; z-index: 1; transform: translate(-50%,-50%); mix-blend-mode: screen; will-change: transform; }

        /* ─── MAIN NAV ────────────────────────────────────────────── */
        #mainnav { 
            position: fixed; top: 0; left: 0; right: 0; z-index: 99999; 
            padding: 1.65rem 3rem; display: flex; justify-content: space-between; 
            align-items: center; background: rgba(10,11,13,.92); 
            backdrop-filter: blur(20px); border-bottom: 1px solid var(--line);
        }
        .nav-logo { font-family: var(--display); font-size: 1.1rem; letter-spacing: .1em; color: var(--fg); text-decoration: none; }
        .nav-logo span { color: var(--gold); }
        .nav-links { display: flex; gap: 2.5rem; list-style: none; }
        .nav-links a { font-size: .65rem; letter-spacing: .12em; text-transform: uppercase; color: rgba(237, 233, 224, .35); text-decoration: none; transition: color .2s; }
        .nav-links a:hover, .nav-links a.act { color: var(--fg); }
        .nav-cta { font-size: .65rem; letter-spacing: .12em; text-transform: uppercase; color: var(--fg); text-decoration: none; border: 1px solid rgba(237, 233, 224, .2); padding: .5rem 1.2rem; transition: background .3s, color .3s; }
        .nav-cta:hover { background: var(--gold); color: var(--bg); }

        /* ─── INFINITE ARENA ────────────────────────────────────── */
        #viewport { 
            perspective: 2000px; width: 100vw; height: 100vh; overflow: hidden; 
            position: relative; z-index: 5;
            background: linear-gradient(rgba(10,11,13,0.9), rgba(10,11,13,0.9)), 
                        url('https://plus.unsplash.com/premium_photo-1673541168090-26775e19c437?q=80&w=872&auto=format&fit=crop') center/cover no-repeat;
        }
        #images { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform-style: preserve-3d; will-change: transform; }

        .item { position: absolute; top: 0; left: 0; will-change: transform; pointer-events: auto; }
        .item-wrapper { transform-style: preserve-3d; transition: transform 0.4s cubic-bezier(.16,1,.3,1); }

        /* IMAGE OVERLAY CARDS */
        .tw-card {
            position: relative; border-radius: 1.2rem; overflow: hidden;
            border: 1px solid rgba(201,168,76,.15);
            box-shadow: 0 15px 45px rgba(0,0,0,0.7);
            background: #000; transition: border-color .6s, box-shadow .6s;
        }
        .tw-card img { width: 100%; height: auto; display: block; filter: grayscale(100%) brightness(0.7); transition: filter .8s, transform .8s; }

        .item-overlay {
            position: absolute; inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.2) 60%, transparent 100%);
            display: flex; flex-direction: column; justify-content: flex-end;
            padding: 2.5rem 2rem; opacity: 0.8; transition: opacity .4s;
        }

        .item-year { font-family: var(--display); font-size: 4.5rem; color: var(--gold); line-height: 0.85; margin-bottom: 10px; text-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .item-desc { font-size: 0.85rem; color: var(--fg); line-height: 1.6; font-weight: 300; }

        .item:hover .tw-card { border-color: var(--gold); box-shadow: 0 0 40px rgba(201,168,76,0.2); }
        .item:hover img { filter: grayscale(0%) brightness(1); }
        .item:hover .item-overlay { opacity: 1; }

        /* ─── FOOTER ────────────────────────────────────────────── */
        .site-footer { position: fixed; bottom: 0; left: 0; right: 0; z-index: 99999; display: flex; justify-content: space-between; align-items: center; padding: 1.2rem 3rem; background: rgba(10, 11, 13, .9); border-top: 1px solid var(--line); backdrop-filter: blur(10px); }
        .ft-logo { font-size: 0.75rem; color: rgba(237, 233, 224, .3); text-transform: uppercase; }
        .ft-link { font-size: 0.65rem; color: var(--gold); text-decoration: none; margin-left: 2rem; }

        @media (max-width: 768px) {
            #mainnav { padding: 1rem 1.5rem; }
            .nav-links, .nav-cta { display: none; }
            .item-year { font-size: 3rem; }
            .item-desc { font-size: 0.75rem; }
        }
    </style>
</head>
<body>

    <div id="cdot"></div>
    <div id="cring"></div>
    <div id="aura"></div>

    <nav id="mainnav">
        <a class="nav-logo" href="index.html">PRAPANCH <span>KOKKALEMADA</span></a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html" class="act">About</a></li>
            <li><a href="index.html#section-cases">Work</a></li>
        </ul>
        <a class="nav-cta" href="mailto:prapanch@example.com"><span>Let's Connect ↗</span></a>
    </nav>

    <div id="viewport">
        <div id="images"></div>
    </div>

    <footer class="site-footer">
        <div class="ft-logo">PRAPANCH KOKKALEMADA © 2026</div>
        <div>
            <a href="https://linkedin.com/in/prapanch" class="ft-link" target="_blank">LINKEDIN</a>
            <a href="mailto:prapanch@example.com" class="ft-link">E-MAIL</a>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script>
        const gridData = [
            { x: 100, y: 100, w: 380, src: '1.png', year: '2026', desc: 'MBA Candidate at MSU. Global Student Ambassador focusing on Strategic Operations.' },
            { x: 600, y: 400, w: 350, src: '2.png', year: '2025', desc: 'Strategy Associate. Developed frameworks for market entry and P&L optimization.' },
            { x: 1100, y: 150, w: 400, src: '3.png', year: '2024', desc: 'Systems Engineer. Leading agile transformations and manufacturing bottlenecks.' },
            { x: 300, y: 800, w: 360, src: '4.png', year: '2023', desc: 'Operations Specialist. Automated workflows using Power BI, SQL, and Lean.' },
            { x: 900, y: 1000, w: 340, src: '5.png', year: '2022', desc: 'Consulting Projects. Solving commercial challenges for global infrastructure clients.' },
            { x: 1400, y: 650, w: 360, src: 'GSA.jpg', year: '2021', desc: 'Engineering Lead. Bridging the gap between technical system and business growth.' },
            { x: 150, y: 1400, w: 380, src: 'MBAA.jpg', year: '2020', desc: 'Foundational Engineering. Core specialization in systems architecture.' },
            { x: 700, y: 1600, w: 350, src: 'class.jpg', year: '2019', desc: 'Project Management. Mastery of Scrum delivery in global environments.' },
            { x: 1250, y: 1400, w: 340, src: 'market.jpeg', year: '2018', desc: 'The Origin. Focus on large-scale data modeling and process automation.' }
        ];

        const container = document.getElementById('images');
        const aura = document.getElementById('aura');
        const cdot = document.getElementById('cdot');
        const cring = document.getElementById('cring');

        let winW = window.innerWidth, winH = window.innerHeight;
        let isMobile = winW < 768;
        let tileSize = { w: 2000, h: 2000 };
        let items = [];
        
        const mouse = { x: 0.5, y: 0.5, tX: 0.5, tY: 0.5 };
        const scroll = { x: 0, y: 0, tX: 0, tY: 0, ease: 0.05 };
        const drag = { active: false, sx: 0, sy: 0, scrollX: 0, scrollY: 0 };
        // Add this below the drag object
        const pan = { x: 0, y: 0, tX: 0, tY: 0 };
        
        let ax = winW/2, ay = winH/2, mx = ax, my = ay;
        let isPressed = false;

        document.addEventListener('mousemove', e => {
    mx = e.clientX; 
    my = e.clientY; 
    mouse.tX = e.clientX / winW; 
    mouse.tY = e.clientY / winH;

    // ADD THIS: Calculates how far the wall should shift based on cursor
    // 0.3 is the intensity. Increase to 1.0 for "same distance" 1:1 mapping.
    pan.tX = (e.clientX - winW / 2) * 0.3; 
    pan.tY = (e.clientY - winH / 2) * 0.3;
});

        // ─── PRESS EFFECT ───
        window.addEventListener('mousedown', () => { 
            isPressed = true; 
            cring.style.width = '70px'; 
            cring.style.height = '70px'; 
            cring.style.borderColor = 'var(--gold)';
            cring.style.borderWidth = '2px';
        });
        window.addEventListener('mouseup', () => { 
            isPressed = false; 
            cring.style.width = '40px'; 
            cring.style.height = '40px'; 
            cring.style.borderColor = 'rgba(255,255,255,0.3)';
            cring.style.borderWidth = '1px';
        });

        function buildGrid() {
            container.innerHTML = ''; items = [];
            const repsX = [0, tileSize.w], repsY = [0, tileSize.h];
            gridData.forEach((d) => {
                const img = new Image(); img.src = d.src;
                img.onload = () => {
                    const ratio = img.naturalHeight / img.naturalWidth;
                    repsX.forEach((ox) => {
                        repsY.forEach((oy) => {
                            const el = document.createElement('div');
                            el.className = 'item';
                            el.style.width = `${isMobile ? d.w * 0.8 : d.w}px`;
                            el.innerHTML = `
                                <div class="item-wrapper">
                                    <div class="tw-card">
                                        <img src="${d.src}">
                                        <div class="item-overlay">
                                            <div class="item-year">${d.year}</div>
                                            <div class="item-desc">${d.desc}</div>
                                        </div>
                                    </div>
                                </div>`;
                            container.appendChild(el);
                            items.push({ 
                                el, wrapper: el.querySelector('.item-wrapper'),
                                x: (isMobile ? winW * 0.1 : d.x) + ox, 
                                y: (isMobile ? (items.length * 450) % tileSize.h : d.y) + oy, 
                                w: d.w, h: d.w * ratio, ex: 0, ey: 0
                            });
                        });
                    });
                };
            });
        }

        function render() {
            // Cursor Follow
            ax += (mx - ax) * 0.1; ay += (my - ay) * 0.1;
            cdot.style.left = `${mx}px`; cdot.style.top = `${my}px`;
            cring.style.left = `${ax}px`; cring.style.top = `${ay}px`;
            aura.style.transform = `translate(calc(${ax}px - 50%), calc(${ay}px - 50%))`;

            mouse.x += (mouse.tX - mouse.x) * 0.05;
            mouse.y += (mouse.tY - mouse.y) * 0.05;
            pan.x += (pan.tX - pan.x) * 0.05; 
            pan.y += (pan.tY - pan.y) * 0.05;

            const rotY = (mouse.x - 0.5) * -12;
            const rotX = (mouse.y - 0.5) * 12;

            scroll.x += (scroll.tX - scroll.x) * scroll.ease;
            scroll.y += (scroll.tY - scroll.y) * scroll.ease;

            items.forEach(item => {
                let px = item.x + scroll.x + item.ex + pan.x; 
                let py = item.y + scroll.y + item.ey + pan.y;

                if (px > winW + 400) item.ex -= tileSize.w;
                if (px + item.w < -400) item.ex += tileSize.w;
                if (py > winH + 400) item.ey -= tileSize.h;
                if (py + item.h < -400) item.ey += tileSize.h;
                
                // Press Scaling Effect
                const pressScale = isPressed ? 1.08 : 1;

                item.el.style.transform = `translate3d(${px}px, ${py}px, 0) rotateY(${rotY}deg) rotateX(${rotX}deg) scale(${pressScale})`;
            });
            requestAnimationFrame(render);
        }

        window.addEventListener('wheel', e => { scroll.tX -= e.deltaX; scroll.tY -= e.deltaY; }, { passive: true });
        window.addEventListener('pointerdown', e => { drag.active = true; drag.sx = e.clientX; drag.sy = e.clientY; drag.scrollX = scroll.tX; drag.scrollY = scroll.tY; });
        window.addEventListener('pointerup', () => drag.active = false);
        window.addEventListener('pointermove', e => { if (drag.active) { scroll.tX = drag.scrollX + (e.clientX - drag.sx) * 1.5; scroll.tY = drag.scrollY + (e.clientY - drag.sy) * 1.5; } });

        buildGrid();
        requestAnimationFrame(render);
    </script>
</body>
</html>
