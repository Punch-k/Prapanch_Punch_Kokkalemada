<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prapanch Kokkalemada | About</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">

  <style>
    /* ─── FOUNDATION ─────────────────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:      #0a0b0d;
      --fg:      #ede9e0;
      --gold:    #c9a84c;
      --line:    rgba(237,233,224,.1);
      --sans:    'DM Sans', sans-serif;
      --display: 'Bebas Neue', sans-serif;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: var(--sans);
      overflow: hidden;
      overscroll-behavior: none;
      cursor: none;
    }

    /* ─── CUSTOM CURSOR ──────────────────────────────────────── */
    #cursor {
      position: fixed;
      width: 10px; height: 10px;
      background: var(--gold);
      border-radius: 50%;
      pointer-events: none;
      z-index: 99999;
      transform: translate(-50%,-50%);
      transition: transform 0.12s ease, width 0.2s ease, height 0.2s ease, opacity 0.2s ease;
      mix-blend-mode: screen;
    }
    #cursor.press {
      width: 20px; height: 20px;
      opacity: 0.6;
    }

    /* ─── AMBIENT AURA ───────────────────────────────────────── */
    #aura {
      position: fixed;
      top: 0; left: 0;
      width: 700px; height: 700px;
      background: radial-gradient(circle, rgba(201,168,76,.13) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      transform: translate(-50%,-50%);
      will-change: transform;
      mix-blend-mode: screen;
    }

    /* ─── MAIN NAV ───────────────────────────────────────────── */
    .mainnav {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 9999;
      padding: 1.65rem 2rem;
      display: flex; justify-content: space-between; align-items: center;
      background: rgba(10,11,13,.88);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--line);
    }
    .nav-logo {
      font-family: var(--display);
      font-size: 1.1rem;
      letter-spacing: .12em;
      color: var(--fg);
      text-decoration: none;
    }
    .nav-logo span { color: var(--gold); }

    .nav-links {
      display: flex; gap: 2.5rem; list-style: none;
    }
    .nav-links a {
      font-size: .65rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: rgba(237,233,224,.35);
      text-decoration: none;
      transition: color .3s;
    }
    .nav-links a:hover,
    .nav-links a.act { color: var(--fg); }

    .nav-cta {
      font-size: .65rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--fg);
      text-decoration: none;
      border: 1px solid rgba(237,233,224,.25);
      padding: .4rem 1.2rem;
      transition: background .3s, color .3s;
    }
    .nav-cta:hover { background: var(--gold); color: var(--bg); }

    /* ─── INFINITE ARENA ─────────────────────────────────────── */
    #viewport {
      perspective: 1800px;
      width: 100%; height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at center, #14161a 0%, #0a0b0d 100%);
      position: relative;
    }

    #images {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      transform-style: preserve-3d;
      will-change: transform;
    }

    /* Individual item outer shell */
    .item {
      position: absolute;
      top: 0; left: 0;
      will-change: transform;
      pointer-events: auto;
    }

    /* Inner wrapper – holds the 3-D tilt on hover */
    .item-wrapper {
      transform-style: preserve-3d;
      transition: transform .15s ease-out;
      cursor: grab;
      will-change: transform;
    }
    .item-wrapper:active { cursor: grabbing; }

    /* ─── IMAGE OVERLAY CARDS ─────────────────────────────────── */
    .tw-card {
      position: relative;
      border-radius: .75rem;
      overflow: hidden;
      border: 1px solid rgba(201,168,76,.12);
      box-shadow: 0 8px 40px rgba(0,0,0,.55);
      transition: border-color .35s, box-shadow .35s;
      background: #000;
      /* GPU layer */
      transform: translateZ(0);
    }

    .tw-card img {
      width: 100%; height: auto;
      display: block;
      filter: grayscale(100%) contrast(1.08) brightness(.95);
      transition: filter .45s ease, transform .45s ease;
      will-change: filter, transform;
    }

    /* Gradient overlay */
    .item-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to top,
        rgba(10,11,13,.96) 0%,
        rgba(10,11,13,.45) 45%,
        transparent 100%
      );
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 1rem 1.25rem 1.25rem;
      opacity: 0;
      transition: opacity .35s ease;
    }

    .item-year {
      font-family: var(--display);
      font-size: 3.2rem;
      color: var(--gold);
      line-height: .85;
      margin-bottom: .35rem;
      text-shadow: 0 2px 12px rgba(0,0,0,.5);
      /* intro: starts clipped */
      clip-path: inset(0 0 100% 0);
      transition: clip-path .5s cubic-bezier(.16,1,.3,1);
    }

    .item-desc {
      font-size: .78rem;
      color: var(--fg);
      line-height: 1.5;
      font-weight: 300;
      max-width: 28ch;
      /* intro: starts invisible */
      opacity: 0;
      transform: translateY(6px);
      transition: opacity .4s .08s ease, transform .4s .08s ease;
    }

    /* ─── HOVER STATES ───────────────────────────────────────── */
    .item:hover .tw-card {
      border-color: var(--gold);
      box-shadow: 0 12px 50px rgba(201,168,76,.22), 0 0 0 1px rgba(201,168,76,.08);
    }
    .item:hover .tw-card img {
      filter: grayscale(0%) contrast(1.05) brightness(1.02);
      transform: scale(1.04);
    }
    .item:hover .item-overlay { opacity: 1; }
    .item:hover .item-year { clip-path: inset(0 0 0% 0); }
    .item:hover .item-desc  { opacity: 1; transform: translateY(0); }

    /* visible = inside viewport (IntersectionObserver adds this class) */
    .item.visible .tw-card {
      border-color: rgba(201,168,76,.18);
    }

    /* ─── MOBILE ─────────────────────────────────────────────── */
    @media (max-width: 768px) {
      .mainnav { padding: .9rem 1.2rem; }
      .nav-links, .nav-cta { display: none; }
      .item-year { font-size: 2.6rem; }
      .item-desc { font-size: .7rem; line-height: 1.4; }
    }

    /* ─── FOOTER ─────────────────────────────────────────────── */
    .site-footer {
      position: fixed; bottom: 0; left: 0; right: 0;
      z-index: 9999;
      display: flex; justify-content: space-between; align-items: center;
      padding: 1rem 2rem;
      background: rgba(10,11,13,.88);
      backdrop-filter: blur(14px);
      border-top: 1px solid var(--line);
    }
    .ft-logo {
      font-size: .72rem;
      color: rgba(237,233,224,.45);
      text-transform: uppercase;
      letter-spacing: .1em;
    }
    .ft-link {
      font-size: .65rem;
      color: var(--gold);
      text-decoration: none;
      margin-left: 1.5rem;
      opacity: .75;
      transition: opacity .3s;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    .ft-link:hover { opacity: 1; }
  </style>
</head>
<body>

  <!-- Custom cursor -->
  <div id="cursor"></div>

  <!-- Ambient aura -->
  <div id="aura"></div>

  <!-- Nav -->
  <nav class="mainnav">
    <a class="nav-logo" href="index.html">PRAPANCH <span>K</span></a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html" class="act">About</a></li>
      <li><a href="index.html#section-cases">Work</a></li>
    </ul>
    <a class="nav-cta" href="mailto:prapanch@example.com">Let's Connect ↗</a>
  </nav>

  <!-- Infinite arena -->
  <div id="viewport">
    <div id="images"></div>
  </div>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="ft-logo">Prapanch Kokkalemada © 2026</div>
    <div>
      <a class="ft-link" href="https://linkedin.com/in/prapanch" target="_blank" rel="noopener">LinkedIn</a>
      <a class="ft-link" href="mailto:prapanch@example.com">E-Mail</a>
    </div>
  </footer>

  <!-- GSAP (CDN, no SplitText plugin needed) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

  <script>
  (() => {
    /* ── DATA ──────────────────────────────────────────────────── */
    const gridData = [
      { x:  150, y:  150, w: 400, src: '1.png',                year: '2026', desc: 'MBA Candidate at MSU. Global Student Ambassador focusing on Strategic Operations.' },
      { x:  850, y:  550, w: 380, src: '2.png',                year: '2025', desc: 'Strategy Associate. Developed frameworks for market entry and P&L optimisation.' },
      { x: 1550, y:  250, w: 420, src: '3.png',                year: '2024', desc: 'Systems Engineer. Leading agile transformations and manufacturing bottlenecks.' },
      { x:  450, y: 1100, w: 380, src: '4.png',                year: '2023', desc: 'Operations Specialist. Automated workflows using Power BI, SQL, and Lean.' },
      { x: 1250, y: 1400, w: 350, src: '5.png',                year: '2022', desc: 'Consulting Projects. Solving commercial challenges for global infrastructure clients.' },
      { x: 1950, y:  850, w: 390, src: 'GSA.jpg',              year: '2021', desc: 'Engineering Lead. Bridging the gap between technical systems and business growth.' },
      { x:  250, y: 1950, w: 410, src: 'MBAA.jpg',             year: '2020', desc: 'Foundational Engineering. Core specialisation in systems architecture.' },
      { x: 1050, y: 2150, w: 380, src: 'Professional.jpg',     year: '2019', desc: 'Project Management. Mastery of Scrum delivery in global environments.' },
      { x: 1750, y: 1850, w: 360, src: 'Hero.jpg',             year: '2018', desc: 'The Origin. Focus on large-scale data modelling and process automation.' },
    ];

    /* ── ELEMENTS ──────────────────────────────────────────────── */
    const container = document.getElementById('images');
    const auraEl    = document.getElementById('aura');
    const cursorEl  = document.getElementById('cursor');

    /* ── STATE ─────────────────────────────────────────────────── */
    let winW = window.innerWidth;
    let winH = window.innerHeight;
    let isMobile = winW < 768;

    const ARENA_W = isMobile ? winW * 2.5 : 2800;
    const ARENA_H = isMobile ? winH * 2.5 : 2800;

    /* Pointer position (normalised 0-1) */
    const mouse = { x: { t: 0.5, c: 0.5 }, y: { t: 0.5, c: 0.5 } };
    /* Press state (0 = up, 1 = down) */
    const press = { t: 0, c: 0 };
    /* Aura smoothed position in px */
    const aura  = { x: { t: winW * 0.5, c: winW * 0.5 },
                    y: { t: winH * 0.5, c: winH * 0.5 } };

    /* Scroll / momentum */
    const scroll = {
      x: { pos: 0, vel: 0 },
      y: { pos: 0, vel: 0 },
    };
    const FRICTION = 0.88;   // how quickly momentum decays

    /* Drag */
    const drag = { active: false, startX: 0, startY: 0, scrollX0: 0, scrollY0: 0 };

    /* Items array */
    let items = [];

    /* ── INTERSECTION OBSERVER ─────────────────────────────────── */
    const observer = new IntersectionObserver(entries => {
      entries.forEach(e => e.target.classList.toggle('visible', e.isIntersecting));
    });

    /* ── BUILD GRID ────────────────────────────────────────────── */
    function buildGrid() {
      container.innerHTML = '';
      items = [];

      const repsX = Math.ceil(ARENA_W / ARENA_W) + 1; // 1 tile wide (tiled by wrapping)
      const repsY = Math.ceil(ARENA_H / ARENA_H) + 1;

      gridData.forEach(({ x, y, w, src, year, desc }) => {
        const img = new Image();
        img.src = src;
        img.onload = () => {
          const ratio = img.naturalHeight / img.naturalWidth;
          const cardW = isMobile ? w * 0.72 : w;
          const cardH = cardW * ratio;

          const el = document.createElement('div');
          el.className = 'item';
          el.style.cssText = `width:${cardW}px`;
          el.innerHTML = `
            <div class="item-wrapper">
              <div class="tw-card">
                <img src="${src}" alt="${desc}" loading="lazy">
                <div class="item-overlay">
                  <div class="item-year">${year}</div>
                  <div class="item-desc">${desc}</div>
                </div>
              </div>
            </div>`;

          container.appendChild(el);
          observer.observe(el);

          const startX = isMobile ? Math.random() * winW * 0.8 : x % ARENA_W;
          const startY = isMobile ? items.length * 400 % ARENA_H : y % ARENA_H;

          // Per-item depth ease (0.04 = slow/far, 0.10 = fast/near)
          const depthEase = Math.random() * 0.06 + 0.04;

          items.push({
            el,
            wrapper: el.querySelector('.item-wrapper'),
            x: startX,
            y: startY,
            w: cardW,
            h: cardH,
            ease: depthEase,
          });

          // Kick intro after all images have a chance to load
          if (items.length === gridData.length) {
            setTimeout(introAnimation, 400);
          }
        };
      });
    }

    /* ── INTRO ANIMATION ───────────────────────────────────────── */
    function introAnimation() {
      // Gather wrappers that are in the visible viewport region
      const wrappers = items.map(d => d.wrapper);

      // Starting offsets – fly in from the nearest screen edge
      const fromVars = items.map(({ x, y }) => {
        const offX = x < winW * 0.5 ? -winW * 0.4 : winW * 0.4;
        const offY = y < winH * 0.5 ? -winH * 0.4 : winH * 0.4;
        return { x: offX, y: offY };
      });

      wrappers.forEach((w, i) => gsap.set(w, fromVars[i]));

      gsap.to(wrappers, {
        x: 0,
        y: 0,
        duration: 1.8,
        ease: 'expo.inOut',
        stagger: 0.04,
        clearProps: 'x,y',
      });

      gsap.fromTo(wrappers,
        { opacity: 0, scale: 0.88 },
        { opacity: 1, scale: 1, duration: 1.4, ease: 'expo.out', stagger: 0.04 }
      );
    }

    /* ── LERP HELPER ───────────────────────────────────────────── */
    const lerp = (a, b, t) => a + (b - a) * t;

    /* ── RENDER LOOP ───────────────────────────────────────────── */
    function render() {
      requestAnimationFrame(render);

      // Mouse normalised lerp
      mouse.x.c = lerp(mouse.x.c, mouse.x.t, 0.06);
      mouse.y.c = lerp(mouse.y.c, mouse.y.t, 0.06);

      // Press lerp
      press.c = lerp(press.c, press.t, 0.1);

      // Aura smooth follow (separate X/Y easing)
      aura.x.c = lerp(aura.x.c, aura.x.t, 0.055);
      aura.y.c = lerp(aura.y.c, aura.y.t, 0.055);
      auraEl.style.transform = `translate(calc(${aura.x.c}px - 50%), calc(${aura.y.c}px - 50%))`;

      // Cursor
      cursorEl.style.left = aura.x.t + 'px';
      cursorEl.style.top  = aura.y.t  + 'px';

      // Momentum decay
      scroll.x.vel *= FRICTION;
      scroll.y.vel *= FRICTION;
      scroll.x.pos += scroll.x.vel;
      scroll.y.pos += scroll.y.vel;

      // Arena tilt (opposite to cursor = looking around effect)
      const tiltY = (mouse.x.c - 0.5) * 18;
      const tiltX = (mouse.y.c - 0.5) * -12;
      const pressScale = 1 - press.c * 0.025;

      items.forEach(item => {
        // Wrap position
        item.x += scroll.x.vel * item.ease * 18;
        item.y += scroll.y.vel * item.ease * 18;

        if (item.x >  ARENA_W * 0.6)  item.x -= ARENA_W;
        if (item.x < -ARENA_W * 0.6)  item.x += ARENA_W;
        if (item.y >  ARENA_H * 0.6)  item.y -= ARENA_H;
        if (item.y < -ARENA_H * 0.6)  item.y += ARENA_H;

        // 3-D placement: translate in 2-D + arena rotation + press scale
        item.el.style.transform =
          `translate3d(${item.x}px, ${item.y}px, 0)
           rotateY(${tiltY}deg) rotateX(${tiltX}deg)
           scale(${pressScale})`;
      });
    }

    /* ── INPUT EVENTS ──────────────────────────────────────────── */
    // Wheel → momentum
    window.addEventListener('wheel', e => {
      scroll.x.vel -= e.deltaX * 0.6;
      scroll.y.vel -= e.deltaY * 0.6;
    }, { passive: true });

    // Drag
    window.addEventListener('pointerdown', e => {
      drag.active   = true;
      drag.startX   = e.clientX;
      drag.startY   = e.clientY;
      drag.scrollX0 = scroll.x.pos;
      drag.scrollY0 = scroll.y.pos;
      press.t = 1;
      cursorEl.classList.add('press');
    });
    window.addEventListener('pointerup', () => {
      drag.active = false;
      press.t = 0;
      cursorEl.classList.remove('press');
    });
    window.addEventListener('pointermove', e => {
      // Update normalised mouse
      mouse.x.t = e.clientX / winW;
      mouse.y.t = e.clientY / winH;
      // Update aura target
      aura.x.t = e.clientX;
      aura.y.t = e.clientY;

      if (!drag.active) return;
      const dx = (e.clientX - drag.startX) * 2.0;
      const dy = (e.clientY - drag.startY) * 2.0;
      scroll.x.vel = dx * 0.08;
      scroll.y.vel = dy * 0.08;
    });

    // Resize
    window.addEventListener('resize', () => {
      winW    = window.innerWidth;
      winH    = window.innerHeight;
      isMobile = winW < 768;
      buildGrid();
    });

    /* ── BOOT ──────────────────────────────────────────────────── */
    buildGrid();
    render();
  })();
  </script>
</body>
</html>
