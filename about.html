<head>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">

    <style>
        /* FOUNDATION */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0b0d; --fg: #ede9e0; --gold: #c9a84c;
            --line: rgba(237,233,224,.1); --sans: 'DM Sans', sans-serif;
            --display: 'Bebas Neue', sans-serif;
        }
        html, body {
            width: 100%; height: 100%; background: var(--bg); color: var(--fg);
            font-family: var(--sans); overflow: hidden; overscroll-behavior: none;
        }
        @media (pointer: fine) { html, body { cursor: none; } }

        /* CUSTOM CURSOR */
        #cdot {
            position: fixed; top: 0; left: 0; width: 6px; height: 6px;
            background: #fff; border-radius: 50%; z-index: 100000;
            pointer-events: none; transform: translate(-50%,-50%);
        }
        #cring {
            position: fixed; top: 0; left: 0; width: 40px; height: 40px;
            border: 1px solid rgba(255,255,255,0.3); border-radius: 50%;
            z-index: 100000; pointer-events: none; transform: translate(-50%,-50%);
            transition: width 0.3s, height 0.3s, border-color 0.3s, border-width 0.3s;
        }
        #aura {
            position: fixed; top: 0; left: 0; width: 800px; height: 800px;
            background: radial-gradient(circle, rgba(201,168,76,.12) 0%, transparent 70%);
            border-radius: 50%; pointer-events: none; z-index: 1;
            transform: translate(-50%,-50%); mix-blend-mode: screen; will-change: transform;
        }

        /* MAIN NAV */
        #mainnav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 99999;
            padding: 1.65rem 3rem; display: flex; justify-content: space-between;
            align-items: center; background: rgba(10,11,13,.95);
            backdrop-filter: blur(20px); border-bottom: 1px solid var(--line);
        }
        .nav-logo { font-family: var(--display); font-size: 1.1rem; letter-spacing: .1em; color: var(--fg); text-decoration: none; }
        .nav-logo span { color: var(--gold); }
        .nav-links { display: flex; gap: 2.5rem; list-style: none; }
        .nav-links a { font-size: .65rem; letter-spacing: .12em; text-transform: uppercase; color: rgba(237,233,224,.35); text-decoration: none; transition: color .2s; }
        .nav-links a:hover, .nav-links a.act { color: var(--fg); }
        .nav-cta { font-size: .65rem; letter-spacing: .12em; text-transform: uppercase; color: var(--fg); text-decoration: none; border: 1px solid rgba(237,233,224,.2); padding: .5rem 1.2rem; transition: background .3s, color .3s; }
        .nav-cta:hover { background: var(--gold); color: var(--bg); }

        /* INFINITE ARENA */
        #viewport {
            width: 100vw; height: 100vh; overflow: hidden;
            position: relative; z-index: 5; background: var(--bg);
        }
        #images {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            will-change: transform;
        }

        /* ITEM — the moving tile container */
        .item {
            position: absolute; top: 0; left: 0;
            will-change: transform; pointer-events: auto;
        }

        /* FRAME — fixed-size window, clips the image */
        .item-frame {
            width: 100%; height: 100%;
            overflow: hidden;
            border-radius: 3px;
            border: 1px solid rgba(201,168,76,.18);
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
            background: #000;
            position: relative;
        }

        /* IMAGE — oversized so it can pan inside the frame */
        .item-frame img {
            width: 130%; height: 130%;
            object-fit: cover;
            position: absolute;
            top: -15%; left: -15%;
            will-change: transform;
            filter: grayscale(60%) brightness(0.8);
            transition: filter 0.6s ease;
            display: block;
        }
        .item:hover .item-frame img {
            filter: grayscale(0%) brightness(1);
        }

        /* CAPTION overlay */
        .item-overlay {
            position: absolute; inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.88) 0%, rgba(0,0,0,0.1) 55%, transparent 100%);
            display: flex; flex-direction: column; justify-content: flex-end;
            padding: 1.2rem 1rem;
            pointer-events: none;
            opacity: 0.9;
            transition: opacity 0.3s;
        }
        .item:hover .item-overlay { opacity: 1; }
        .item-year {
            font-family: var(--display); font-size: 2.8rem;
            color: var(--gold); line-height: 0.9; margin-bottom: 5px;
        }
        .item-desc {
            font-size: 0.7rem; color: var(--fg);
            line-height: 1.4; font-weight: 300;
        }

        /* FOOTER */
        .site-footer {
            position: fixed; bottom: 0; left: 0; right: 0; z-index: 99999;
            display: flex; justify-content: space-between; align-items: center;
            padding: 1.2rem 3rem; background: rgba(10,11,13,.9);
            border-top: 1px solid var(--line); backdrop-filter: blur(10px);
        }
        .ft-logo { font-size: 0.75rem; color: rgba(237,233,224,.3); text-transform: uppercase; }
        .ft-link { font-size: 0.65rem; color: var(--gold); text-decoration: none; margin-left: 2rem; }

        @media (max-width: 768px) {
            #cdot, #cring, #aura { display: none !important; }
            #mainnav { padding: 1rem 1.5rem; }
            .nav-links { gap: 1rem; }
            .nav-links a { font-size: 0.55rem; color: var(--fg); }
            .nav-cta { display: none; }
            .item-year { font-size: 2rem; }
            .item-desc { font-size: 0.65rem; }
        }
    </style>
</head>
<body>
    <div id="cdot"></div>
    <div id="cring"></div>
    <div id="aura"></div>

    <nav id="mainnav">
        <a class="nav-logo" href="index.html">PRAPANCH <span>KOKKALEMADA</span></a>
        <ul class="nav-links">

        </ul>
        <a class="nav-cta" href="mailto:prapanch@kokkalemada.com"><span>Let's Connect &#8599;</span></a>
    </nav>

    <div id="viewport">
        <div id="images"></div>
    </div>

    <footer class="site-footer">
        <div class="ft-logo">PRAPANCH KOKKALEMADA &copy; 2026</div>
        <div>
            <a href="https://linkedin.com/in/prapanch" class="ft-link" target="_blank" rel="noopener">LINKEDIN</a>
            <a href="mailto:prapanch@kokkalemada.com" class="ft-link">E-MAIL</a>
        </div>
    </footer>

    <script>
    /* ---- GRID DATA --------------------------------------------------------
       Tile size ~1084x882 mirrors Codrops density.
       w = frame width in px; height is auto-computed from image aspect ratio.
       x,y positions are within one tile and repeat seamlessly.
    ----------------------------------------------------------------------- */
    var gridData = [
        { x: -30,  y: -20,  w: 260, src: '1.png',       year: '2026', desc: 'MBA Candidate at MSU Broad. Global Student Ambassador.' },
        { x:  50,  y: 120,  w: 360, src: '2.png',       year: '2025', desc: 'Strategy Associate. Frameworks for market entry.' },
        { x: 330,  y:  50,  w: 240, src: '3.png',       year: '2024', desc: 'Systems Engineer. Leading agile transformations.' },
        { x: 130,  y: 400,  w: 170, src: '4.png',       year: '2023', desc: 'Operations Specialist. Automated workflows.' },
        { x: 540,  y: 310,  w: 170, src: '5.png',       year: '2022', desc: 'Consulting Projects. Commercial challenges.' },
        { x: 620,  y: 100,  w: 340, src: 'GSA.jpg',     year: '2021', desc: 'Global Ambassador. Engineering lead.' },
        { x: -40,  y: 560,  w: 220, src: 'MBAA.jpg',    year: '2020', desc: 'MBA Association. Systems architecture.' },
        { x: 320,  y: 560,  w: 330, src: 'class.jpg',   year: '2019', desc: 'Project Management. Scrum delivery.' },
        { x: 650,  y: 490,  w: 200, src: 'market.jpeg', year: '2018', desc: 'The Origin. Large-scale data modeling.' }
    ];

    /* ---- CONSTANTS -------------------------------------------------------- */
    var TILE_W    = 1084;   // tile repeat width  (px)
    var TILE_H    = 882;    // tile repeat height (px)
    var MAX_SHIFT = 100;    // max pan distance from center (px)
    var GRID_EASE = 0.055;  // pan inertia (Codrops feel)
    var MOUSE_EASE = 0.06;  // normalized-mouse lerp speed
    var IMG_DEPTH = 0.18;   // fraction of pan applied to image counter-move
    var DRAG_MULT = 1.5;    // drag scroll multiplier

    /* ---- STATE ------------------------------------------------------------ */
    var container = document.getElementById('images');
    var aura  = document.getElementById('aura');
    var cdot  = document.getElementById('cdot');
    var cring = document.getElementById('cring');

    var winW = window.innerWidth;
    var winH = window.innerHeight;
    var isMobile = winW < 768;

    var mx = winW / 2, my = winH / 2;   // raw cursor
    var ax = mx, ay = my;                // smoothed cursor (for ring lag)

    var mouse  = { x: 0.5, y: 0.5, tX: 0.5, tY: 0.5 };
    var scroll = { x: 0, y: 0, tX: 0, tY: 0, ease: 0.028 };
    var pan    = { x: 0, y: 0 };
    var panTargetX = 0, panTargetY = 0;
    var drag   = { active: false, sx: 0, sy: 0, scrollX: 0, scrollY: 0 };
    var items  = [];

    /* ---- BUILD GRID ------------------------------------------------------- */
    function buildGrid() {
        container.innerHTML = '';
        items = [];

        var repsX = [0, TILE_W];
        var repsY = [0, TILE_H];

        gridData.forEach(function(d) {
            var probe = new Image();
            probe.src = d.src;

            function spawn() {
                var ratio = probe.naturalHeight / probe.naturalWidth || 0.75;
                var fw = isMobile ? Math.round(d.w * 0.75) : d.w;
                var fh = Math.round(fw * ratio);

                repsX.forEach(function(ox) {
                    repsY.forEach(function(oy) {
                        var el       = document.createElement('div');
                        el.className = 'item';
                        el.style.width  = fw + 'px';
                        el.style.height = fh + 'px';

                        var frame    = document.createElement('div');
                        frame.className = 'item-frame';

                        var imgEl    = document.createElement('img');
                        imgEl.src    = d.src;
                        imgEl.alt    = d.desc;

                        var overlay  = document.createElement('div');
                        overlay.className = 'item-overlay';

                        var yearEl   = document.createElement('div');
                        yearEl.className = 'item-year';
                        yearEl.textContent = d.year;

                        var descEl   = document.createElement('div');
                        descEl.className = 'item-desc';
                        descEl.textContent = d.desc;

                        overlay.appendChild(yearEl);
                        overlay.appendChild(descEl);
                        frame.appendChild(imgEl);
                        frame.appendChild(overlay);
                        el.appendChild(frame);
                        container.appendChild(el);

                        items.push({
                            el:  el,
                            img: imgEl,
                            x:   d.x + ox,
                            y:   d.y + oy,
                            w:   fw,
                            h:   fh,
                            ex:  0,
                            ey:  0
                        });
                    });
                });
            }

            if (probe.complete && probe.naturalWidth > 0) {
                spawn();
            } else {
                probe.onload = spawn;
            }
        });
    }

    /* ---- RENDER LOOP ------------------------------------------------------ */
    function render() {
        /* 1. Smooth cursor dot/ring */
        ax += (mx - ax) * 0.12;
        ay += (my - ay) * 0.12;
        cdot.style.left  = mx + 'px';
        cdot.style.top   = my + 'px';
        cring.style.left = ax + 'px';
        cring.style.top  = ay + 'px';
        aura.style.transform = 'translate(calc(' + ax + 'px - 50%), calc(' + ay + 'px - 50%))';

        /* 2. Lerp normalized mouse */
        mouse.x += (mouse.tX - mouse.x) * MOUSE_EASE;
        mouse.y += (mouse.tY - mouse.y) * MOUSE_EASE;

        /* 3. Derive pan target — cursor right moves grid left (camera look-around) */
        panTargetX = -(mouse.x - 0.5) * MAX_SHIFT * 2;
        panTargetY = -(mouse.y - 0.5) * MAX_SHIFT * 2;

        /* 4. Ease pan (heavy inertia = Codrops feel) */
        pan.x += (panTargetX - pan.x) * GRID_EASE;
        pan.y += (panTargetY - pan.y) * GRID_EASE;

        /* 5. Scroll inertia */
        scroll.x += (scroll.tX - scroll.x) * scroll.ease;
        scroll.y += (scroll.tY - scroll.y) * scroll.ease;

        /* 6. Position items and counter-move image inside frame */
        for (var i = 0; i < items.length; i++) {
            var item = items[i];
            var px = item.x + scroll.x + item.ex + pan.x;
            var py = item.y + scroll.y + item.ey + pan.y;

            /* Seamless tile wrapping */
            if (px > winW + item.w)    item.ex -= TILE_W;
            if (px + item.w < -item.w) item.ex += TILE_W;
            if (py > winH + item.h)    item.ey -= TILE_H;
            if (py + item.h < -item.h) item.ey += TILE_H;

            /* Move the whole tile (grid pan + scroll) */
            item.el.style.transform = 'translate(' + px + 'px,' + py + 'px)';

            /* Counter-parallax: image slides OPPOSITE to pan inside the fixed frame.
               IMG_DEPTH controls how much the image moves relative to the frame.
               Clamped so the oversized image never exposes a gap edge. */
            var pctX = ((-pan.x * IMG_DEPTH) / item.w) * 100;
            var pctY = ((-pan.y * IMG_DEPTH) / item.h) * 100;
            pctX = Math.max(-12, Math.min(12, pctX));
            pctY = Math.max(-12, Math.min(12, pctY));
            item.img.style.transform = 'translate(' + pctX + '%,' + pctY + '%)';
        }

        requestAnimationFrame(render);
    }

    /* ---- EVENT LISTENERS -------------------------------------------------- */
    document.addEventListener('mousemove', function(e) {
        mx = e.clientX;
        my = e.clientY;
        mouse.tX = e.clientX / winW;
        mouse.tY = e.clientY / winH;
    });

    window.addEventListener('mousedown', function() {
        cring.style.width       = '70px';
        cring.style.height      = '70px';
        cring.style.borderColor = 'var(--gold)';
    });

    window.addEventListener('mouseup', function() {
        cring.style.width       = '40px';
        cring.style.height      = '40px';
        cring.style.borderColor = 'rgba(255,255,255,0.3)';
    });

    window.addEventListener('wheel', function(e) {
        scroll.tX -= e.deltaX;
        scroll.tY -= e.deltaY;
    }, { passive: true });

    window.addEventListener('pointerdown', function(e) {
        drag.active  = true;
        drag.sx      = e.clientX;
        drag.sy      = e.clientY;
        drag.scrollX = scroll.tX;
        drag.scrollY = scroll.tY;
    });

    window.addEventListener('pointerup', function() {
        drag.active = false;
    });

    window.addEventListener('pointermove', function(e) {
        if (drag.active) {
            scroll.tX = drag.scrollX + (e.clientX - drag.sx) * DRAG_MULT;
            scroll.tY = drag.scrollY + (e.clientY - drag.sy) * DRAG_MULT;
        }
    });

    window.addEventListener('resize', function() {
        winW     = window.innerWidth;
        winH     = window.innerHeight;
        isMobile = winW < 768;
        buildGrid();
    });

    /* ---- INIT ------------------------------------------------------------- */
    buildGrid();
    requestAnimationFrame(render);
    </script>
</body>
