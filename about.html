<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prapanch Kokkalemada | About</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        /* ─── FOUNDATION & FLUID SCALE ─── */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg: #0a0b0d; --fg: #ede9e0; --gold: #c9a84c;
            --line: rgba(237,233,224,.1); --sans: 'DM Sans', sans-serif;
            --display: 'Bebas Neue', sans-serif;
            --margin: 48rem; /* Matches your main page side margins */
        }

        /* 1rem = 1px scaling factor seen on your screen */
        html { font-size: .0694444444vw; scroll-behavior: smooth; }
        @media (max-width: 1024px) { html { font-size: 1px; } }

        body { 
            background: var(--bg); color: var(--fg); font-family: var(--sans); 
            overflow: hidden; -webkit-font-smoothing: antialiased;
        }

        /* ─── ORIGINAL HEADER (FIXED SELECTORS) ─── */
        .frame {
            width: 100%; position: fixed; top: 0; left: 0; z-index: 999;
            padding: 26rem var(--margin); /* 26rem = 26px height */
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(10, 11, 13, 0.95); backdrop-filter: blur(20px);
            border-bottom: 1rem solid var(--line);
        }

        .frame .frame-left { display: flex; align-items: center; gap: 40rem; }
        
        .frame .logo { 
            font-family: var(--display); font-size: 18rem; 
            letter-spacing: .1em; text-transform: uppercase; 
            text-decoration: none; color: var(--fg); 
        }
        .frame .logo span { color: var(--gold); }

        .nav-links { display: flex; gap: 30rem; list-style: none; }
        .nav-links a { 
            font-size: 11rem; text-transform: uppercase; letter-spacing: 0.1em;
            color: rgba(237,233,224,0.4); text-decoration: none; transition: color 0.3s;
        }
        .nav-links a:hover, .nav-links a.active { color: var(--fg); }

        .nav-cta {
            font-size: 11rem; text-transform: uppercase; color: var(--fg);
            border: 1rem solid rgba(237,233,224,0.2); padding: 8rem 20rem;
            text-decoration: none; transition: all 0.3s;
        }
        .nav-cta:hover { background: var(--gold); color: var(--bg); }

        /* ─── ARENA / GRID ─── */
        #hero { width: 100vw; height: 100vh; overflow: hidden; position: relative; z-index: 5; }
        #images { position: absolute; top: 0; left: 0; width: 100%; height: 100%; will-change: transform; }
        
        .item { position: absolute; top: 0; left: 0; will-change: transform; }
        .item-image { 
            width: 100%; height: 100%; overflow: hidden; border-radius: 4rem;
            border: 1rem solid rgba(201,168,76,0.15); background: #000;
        }
        .item-image img { 
            width: 150%; height: 150%; object-fit: cover; position: absolute; 
            top: -25%; left: -25%; filter: grayscale(1) brightness(0.7); 
            transition: filter 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .item:hover img { filter: grayscale(0) brightness(1); }

        .item-content {
            position: absolute; bottom: 0; left: 0; width: 100%; padding: 20rem;
            background: linear-gradient(transparent, rgba(0,0,0,0.9)); pointer-events: none;
        }
        .item-year { font-family: var(--display); font-size: 32rem; color: var(--gold); }
        .item-title { font-size: 12rem; font-weight: 300; line-height: 1.4; color: var(--fg); }

        /* ─── ORIGINAL FOOTER ─── */
        .site-footer {
            position: fixed; bottom: 0; left: 0; right: 0; z-index: 999;
            display: flex; justify-content: space-between; align-items: center;
            padding: 24rem var(--margin); background: rgba(10, 11, 13, 0.9);
            border-top: 1rem solid var(--line); backdrop-filter: blur(10px);
        }
        .ft-copyright { font-size: 11rem; color: rgba(237, 233, 224, 0.3); text-transform: uppercase; }
        .ft-links { display: flex; gap: 25rem; }
        .ft-links a { font-size: 11rem; color: var(--gold); text-decoration: none; }
    </style>
</head>
<body>

    <header class="frame">
        <div class="frame-left">
            <a href="index.html" class="logo">PRAPANCH <span>KOKKALEMADA</span></a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html" class="active">About</a></li>
                <li><a href="index.html#work">Work</a></li>
            </ul>
        </div>
        <a href="mailto:prapanch@example.com" class="nav-cta">Connect &#8599;</a>
    </header>

    <div id="hero">
        <div id="images"></div>
    </div>

    <footer class="site-footer">
        <div class="ft-copyright">Prapanch Kokkalemada &copy; 2026</div>
        <div class="ft-links">
            <a href="https://linkedin.com/in/prapanch" target="_blank">LinkedIn</a>
            <a href="mailto:prapanch@example.com">Email</a>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script>
        const gridData = [
            { x: 100, y: 150, w: 350, h: 500, src: '1.png', year: '2026', title: 'Full-Time MBA, MSU' },
            { x: 600, y: 450, w: 500, h: 350, src: '2.png', year: '2025', title: 'Corporate Strategy Frameworks' },
            { x: 1200, y: 200, w: 320, h: 480, src: '3.png', year: '2024', title: 'Systems Engineering Lead' },
            { x: 250, y: 850, w: 450, h: 300, src: '4.png', year: '2023', title: 'Supply Chain Optimization' },
            { x: 950, y: 1000, w: 300, h: 450, src: '5.png', year: '2022', title: 'Global Case Competitions' },
            { x: 1500, y: 700, w: 480, h: 320, src: 'GSA.jpg', year: '2021', title: 'GSA Student Ambassador' },
            { x: 150, y: 1450, w: 400, h: 400, src: 'MBAA.jpg', year: '2020', title: 'Technical Strategy' },
            { x: 750, y: 1650, w: 450, h: 300, src: 'class.jpg', year: '2019', title: 'Business Operations' },
            { x: 1300, y: 1450, w: 350, h: 500, src: 'market.jpeg', year: '2018', title: 'Market Analysis' }
        ];

        const container = document.getElementById('images');
        let winW = window.innerWidth, winH = window.innerHeight;
        let items = [], TILE_W = 1800, TILE_H = 1500;
        
        const mouse = { x: 0.5, y: 0.5, tX: 0.5, tY: 0.5 };
        const scroll = { x: 0, y: 0, tX: 0, tY: 0 };

        function buildGrid() {
            container.innerHTML = ''; items = [];
            const repsX = [-TILE_W, 0, TILE_W], repsY = [-TILE_H, 0, TILE_H];
            gridData.forEach((d) => {
                repsX.forEach((ox) => {
                    repsY.forEach((oy) => {
                        const el = document.createElement('div');
                        el.className = 'item';
                        el.style.width = d.w + 'rem'; el.style.height = d.h + 'rem';
                        el.innerHTML = `
                            <div class="item-image">
                                <img src="${d.src}" loading="eager">
                                <div class="item-content">
                                    <div class="item-year">${d.year}</div>
                                    <div class="item-title">${d.title}</div>
                                </div>
                            </div>`;
                        container.appendChild(el);
                        items.push({ el, img: el.querySelector('img'), x: d.x, y: d.y, ox, oy, w: d.w, h: d.h });
                    });
                });
            });
        }

        function render() {
            mouse.x += (mouse.tX - mouse.x) * 0.05;
            mouse.y += (mouse.tY - mouse.y) * 0.05;
            scroll.x += (scroll.tX - scroll.x) * 0.05;
            scroll.y += (scroll.tY - scroll.y) * 0.05;

            const rotY = (mouse.x - 0.5) * -20;
            const rotX = (mouse.y - 0.5) * 20;

            items.forEach(item => {
                let px = item.x + item.ox + scroll.x;
                let py = item.y + item.oy + scroll.y;

                // Infinite Wrapping Math
                while(px < -TILE_W) px += TILE_W * 3;
                while(px > TILE_W * 2) px -= TILE_W * 3;
                while(py < -TILE_H) py += TILE_H * 3;
                while(py > TILE_H * 2) py -= TILE_H * 3;

                item.el.style.transform = `translate3d(${px}rem, ${py}rem, 0) rotateX(${rotX}deg) rotateY(${rotY}deg)`;
                // Parallax Window Effect
                item.img.style.transform = `translate3d(${px * -0.1}rem, ${py * -0.1}rem, 0) scale(1.3)`;
            });
            requestAnimationFrame(render);
        }

        window.addEventListener('mousemove', e => {
            mouse.tX = e.clientX / winW;
            mouse.tY = e.clientY / winH;
        });

        window.addEventListener('wheel', e => {
            scroll.tX -= e.deltaX * 0.5;
            scroll.tY -= e.deltaY * 0.5;
        }, { passive: true });

        window.addEventListener('resize', () => {
            winW = window.innerWidth; winH = window.innerHeight;
            buildGrid();
        });

        buildGrid();
        render();
    </script>
</body>
</html>
