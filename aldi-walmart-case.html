<html lang="en">

    <title>Aldi vs. Walmart | Case Study</title>

    <style>
        /* ─── CORE BRANDING ─── */
        :root {
            --bg: #0a0b0d; --fg: #ede9e0; --gold: #c9a84c; --line: rgba(237,233,224,.1);
            --sans: 'DM Sans', sans-serif; --display: 'Bebas Neue', sans-serif;
            --ease: cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        body {
            background: var(--bg); color: var(--fg); font-family: var(--sans); 
            margin: 0; padding: 0; line-height: 1.65; overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* ─── 1. PARALLAX PARTICLES BACKGROUND ─── */
        #particle-net {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -2; background: var(--bg); overflow: hidden;
        }
        .orb {
            position: absolute; border-radius: 50%; filter: blur(60px); opacity: 0.15;
            animation: float 20s infinite alternate ease-in-out;
        }
        .orb1 { width: 40vw; height: 40vw; background: var(--gold); top: -10%; left: -10%; }
        .orb2 { width: 30vw; height: 30vw; background: #ffffff; bottom: 10%; right: -5%; animation-delay: -5s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(10vw, 15vh) scale(1.2); }
        }

        /* ─── 2. TYPING ANIMATION (HERO) ─── */
        .hero {
            height: 75vh; display: flex; flex-direction: column; justify-content: center;
            align-items: center; text-align: center; border-bottom: 1px solid var(--line);
            padding: 0 2rem; position: relative; z-index: 10;
        }
        .typewriter h1 {
            font-family: var(--display); font-size: clamp(3.5rem, 8vw, 7rem);
            color: var(--gold); margin: 0; letter-spacing: 0.05em; line-height: 1;
            overflow: hidden; border-right: .15em solid var(--gold); 
            white-space: nowrap; margin: 0 auto;
            animation: typing 2.5s steps(40, end), blink-caret .75s step-end infinite;
        }
        @keyframes typing { from { width: 0 } to { width: 100% } }
        @keyframes blink-caret { from, to { border-color: transparent } 50% { border-color: var(--gold); } }
